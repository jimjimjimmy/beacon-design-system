<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beacon Components — Batch 3 Preview</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #e8e4de; font-family: 'Inter', sans-serif; color: #141810; }
    .page-header { padding: 32px 32px 16px; }
    .page-header h1 { font-size: 28px; font-weight: 900; letter-spacing: -1px; }
    .page-header p { font-size: 14px; color: #999; margin-top: 4px; }
    .section { padding: 24px 32px; }
    .section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #999; margin-bottom: 16px; }
    .component-row { display: flex; flex-wrap: wrap; gap: 24px; align-items: flex-start; margin-bottom: 24px; }
    .component-wrap { position: relative; }
    .component-name { font-size: 12px; font-weight: 700; color: #999; margin-bottom: 8px; letter-spacing: -0.25px; }
    .copy-btn { position: absolute; top: 24px; right: 8px; background: #141810; color: #fafafa; border: none; border-radius: 4px; padding: 4px 10px; font-size: 10px; font-weight: 600; cursor: pointer; z-index: 10; font-family: 'Inter', monospace; opacity: 0.7; transition: opacity 0.15s; }
    .copy-btn:hover { opacity: 1; }
    .copy-btn.copied { background: #39503d; }
    .code-panel { display: none; background: #1a1a1a; color: #e0e0e0; padding: 16px; border-radius: 8px; margin-top: 8px; font-size: 11px; line-height: 1.5; font-family: 'SF Mono', 'Fira Code', monospace; max-height: 300px; overflow: auto; white-space: pre; }
    .code-panel.open { display: block; }
    .toggle-code { background: none; border: 1px solid #ccc; border-radius: 4px; padding: 3px 8px; font-size: 10px; font-weight: 600; cursor: pointer; color: #999; margin-top: 8px; font-family: 'Inter', sans-serif; }
    .toggle-code:hover { border-color: #141810; color: #141810; }
    hr.section-divider { border: none; border-top: 1px solid #d4cfc7; margin: 8px 32px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    /* ─── Design Tokens ─── */
    const T = {
      cream:"#f0e8d8", slate:"#141810", white:"#fafafa", red:"#de0100",
      orange:"#f80", deepGreen:"#39503d", gray:"#999", warmBg:"#fff9ed",
      creamBorder:"#e9e1d3", shadow:"0 4px 15px rgba(0,0,0,0.15)",
    };

    /* ─── Icons ─── */
    function IconBeaconDot(){return <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="9" fill="#FF8800"/></svg>}
    function IconChevronForward({color="#999"}){return <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}
    function IconChevronBack({color="#141810"}){return <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}
    function IconPlus({color="#141810"}){return <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke={color} strokeWidth="1.5" strokeLinecap="round"/></svg>}
    function IconGlobe({color="#141810"}){return <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke={color} strokeWidth="1.5"/><path d="M3 12h18M12 3c2.5 2.5 4 5.5 4 9s-1.5 6.5-4 9c-2.5-2.5-4-5.5-4-9s1.5-6.5 4-9z" stroke={color} strokeWidth="1.5"/></svg>}
    function IconCrossed({color="#141810"}){return <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 3v18M3 12h18M7 7l10 10M17 7L7 17" stroke={color} strokeWidth="1.5" strokeLinecap="round"/></svg>}
    function IconUpDown({color="#141810"}){return <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 3l4 5H8l4-5zM12 21l-4-5h8l-4 5z" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}
    function IconVerify(){return <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M21.56 10.738L20.2 9.154c-.266-.302-.478-.87-.478-1.274V6.178c0-1.148-.946-2.094-2.094-2.094h-1.702c-.394 0-.972-.212-1.274-.478l-1.584-1.35c-.89-.758-2.348-.758-3.248 0L8.236 3.616c-.292.256-.87.468-1.264.468H5.22c-1.148 0-2.094.946-2.094 2.094V7.89c0 .394-.212.962-.468 1.264l-1.34 1.594c-.748.89-.748 2.338 0 3.228l1.34 1.594c.256.302.468.87.468 1.264v1.712c0 1.148.946 2.094 2.094 2.094h1.752c.394 0 .972.212 1.264.478l1.584 1.35c.89.758 2.348.758 3.248 0l1.584-1.35c.302-.266.87-.478 1.274-.478h1.702c1.148 0 2.094-.946 2.094-2.094v-1.702c0-.394.212-.972.478-1.274l1.35-1.584c.768-.9.768-2.348.01-3.238z" stroke="#999" strokeLinecap="round" strokeLinejoin="round"/><path d="M8.38 12l2.33 2.33 4.66-4.66" stroke="#999" strokeLinecap="round" strokeLinejoin="round"/></svg>}
    function IconInfo(){return <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M11.949 11.04c-.16 0-.312.063-.424.176a.6.6 0 0 0-.176.424v3.766a.6.6 0 0 0 1.2 0v-3.766a.6.6 0 0 0-.6-.6Z" fill="#999"/><path d="M12.749 8.863c0 1.066-1.6 1.066-1.6 0s1.6-1.066 1.6 0Z" fill="#999"/><circle cx="11.782" cy="11.782" r="7.5" stroke="#999"/></svg>}
    function IconNavHome({active}){return <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M9.02 2.84l-5.39 4.2C2.73 7.74 2 9.23 2 10.36v7.41c0 2.02 1.64 3.67 3.66 3.67h12.68c2.02 0 3.66-1.65 3.66-3.66v-7.3c0-1.21-.81-2.76-1.79-3.45l-6.18-4.33c-1.4-.98-3.65-.93-5.01.14z" stroke="#141810" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" fill={active?"#141810":"none"}/></svg>}
    function IconNavIssues({active}){return <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M8 2v3M16 2v3M3.5 9.09h17M21 8.5V17c0 3-1.5 5-5 5H8c-3.5 0-5-2-5-5V8.5c0-3 1.5-5 5-5h8c3.5 0 5 2 5 5z" stroke="#141810" strokeWidth="1.5" strokeMiterlimit="10" strokeLinecap="round" strokeLinejoin="round"/></svg>}
    function IconNavPulse({active}){return <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M8.97 22H14.97C19.97 22 21.97 20 21.97 15V9C21.97 4 19.97 2 14.97 2H8.97C3.97 2 1.97 4 1.97 9V15C1.97 20 3.97 22 8.97 22Z" stroke="#141810" strokeWidth="1.5" fill={active?"#141810":"none"}/><path d="M1.97 12.7L7.97 12.68C8.72 12.68 9.56 13.25 9.84 13.95L10.98 16.83C11.24 17.48 11.65 17.48 11.91 16.83L14.2 11.02C14.42 10.46 14.83 10.44 15.11 10.97L16.15 12.94C16.46 13.53 17.26 14.01 17.92 14.01H21.98" stroke={active?"#fff":"#141810"} strokeWidth="1.5"/></svg>}
    function IconNavOfficials({active}){return <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M18 18.86h-.76c-.8 0-1.56.31-2.12.87l-1.71 1.69c-.78.77-2.05.77-2.83 0l-1.71-1.69c-.56-.56-1.33-.87-2.12-.87H6c-1.66 0-3-1.33-3-2.97V4.98c0-1.64 1.34-2.97 3-2.97h12c1.66 0 3 1.33 3 2.97v10.91c0 1.63-1.34 2.97-3 2.97z" stroke="#141810" strokeWidth="1.5" fill={active?"#141810":"none"}/><path d="M12 10a2.33 2.33 0 100-4.66A2.33 2.33 0 0012 10zM16 15.66c0-1.8-1.79-3.26-4-3.26s-4 1.46-4 3.26" stroke={active?"#fff":"#141810"} strokeWidth="1.5" strokeLinecap="round"/></svg>}
    function IconNavAccount({active}){return <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 12a5 5 0 100-10 5 5 0 000 10zM20.59 22c0-3.87-3.85-7-8.59-7s-8.59 3.13-8.59 7" stroke="#141810" strokeWidth="1.5" strokeLinecap="round" fill={active?"#141810":"none"}/></svg>}

    /* ─── Copy Code Helper ─── */
    function CopyButton({ code }) {
      const [copied, setCopied] = useState(false);
      const handleCopy = () => {
        navigator.clipboard.writeText(code).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        });
      };
      return <button className={`copy-btn ${copied ? "copied" : ""}`} onClick={handleCopy}>{copied ? "Copied!" : "Copy JSX"}</button>;
    }
    function CodeToggle({ code }) {
      const [open, setOpen] = useState(false);
      return (
        <div>
          <button className="toggle-code" onClick={() => setOpen(!open)}>{open ? "Hide Code" : "View Code"}</button>
          <pre className={`code-panel ${open ? "open" : ""}`}>{code}</pre>
        </div>
      );
    }

    /* ═══════════════════════════════════════════
       SHARED COMPONENTS
       ═══════════════════════════════════════════ */

    /* 1. SectionTitle */
    function SectionTitle({ title, subtitle, showViewAll }) {
      return (
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",width:"100%"}}>
          <div style={{display:"flex",flexDirection:"column",gap:2,flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <IconBeaconDot/>
              <h2 style={{fontSize:18,fontWeight:800,color:T.slate,lineHeight:"130%",letterSpacing:-0.5,margin:0}}>{title}</h2>
            </div>
            {subtitle && <p style={{fontSize:13,fontWeight:500,color:T.gray,lineHeight:"130%",letterSpacing:-0.5,margin:0}}>{subtitle}</p>}
          </div>
          {showViewAll && <div style={{display:"flex",alignItems:"center",gap:4,cursor:"pointer"}}><span style={{fontSize:13,fontWeight:600,color:T.slate,letterSpacing:-0.5,whiteSpace:"nowrap"}}>View All</span><IconChevronForward color={T.slate}/></div>}
        </div>
      );
    }

    /* 2. BottomTabBar */
    function BottomTabBar({ activeTab = "home" }) {
      const tabs = [{key:"home",label:"Home",Icon:IconNavHome},{key:"issues",label:"Issues",Icon:IconNavIssues},{key:"pulse",label:"Pulse",Icon:IconNavPulse},{key:"officials",label:"Officials",Icon:IconNavOfficials},{key:"account",label:"Account",Icon:IconNavAccount}];
      return (
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-around",width:393,height:64,backgroundColor:T.cream,borderTop:`1px solid ${T.creamBorder}`,position:"relative"}}>
          {tabs.map(({key,label,Icon})=>{
            const isActive = activeTab===key;
            return <div key={key} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer",position:"relative",flex:1,padding:"8px 0"}}>
              <Icon active={isActive}/>
              <span style={{fontSize:10,fontWeight:600,letterSpacing:-0.25,color:isActive?T.slate:T.gray}}>{label}</span>
              {isActive && <div style={{position:"absolute",bottom:0,left:"50%",transform:"translateX(-50%)",width:32,height:3,backgroundColor:T.slate,borderRadius:2}}/>}
            </div>
          })}
        </div>
      );
    }

    /* 3. BackHeader */
    function BackHeader({ title }) {
      return (
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 18px",height:48,width:393,backgroundColor:T.cream}}>
          <div style={{width:24,height:24,cursor:"pointer",display:"flex",alignItems:"center"}}><IconChevronBack/></div>
          <span style={{fontSize:18,fontWeight:700,color:"#a19a8b",lineHeight:"130%",letterSpacing:-0.5,textAlign:"center"}}>{title}</span>
          <div style={{width:24,height:24}}/>
        </div>
      );
    }

    /* 4. ZipCodeCTA */
    function ZipCodeCTA() {
      return (
        <div style={{width:357,borderRadius:10,backgroundColor:T.deepGreen,padding:18}}>
          <div style={{display:"flex",gap:16,alignItems:"flex-start"}}>
            <div style={{flex:1,display:"flex",flexDirection:"column",gap:8}}>
              <h3 style={{fontSize:18,fontWeight:800,color:T.white,lineHeight:"130%",letterSpacing:-0.5,margin:0}}>Politics hits different when it's local.</h3>
              <p style={{fontSize:13,fontWeight:500,color:"rgba(250,250,250,0.7)",lineHeight:"130%",letterSpacing:-0.5,margin:0}}>Enter your zip to see what's happening in your district.</p>
              <input type="text" placeholder="Enter your zip code" maxLength={5} style={{width:"100%",height:36,borderRadius:5,border:"1px solid rgba(250,250,250,0.3)",backgroundColor:"rgba(250,250,250,0.1)",color:T.white,fontSize:13,fontWeight:500,padding:"0 12px",outline:"none",fontFamily:"Inter,sans-serif",letterSpacing:-0.5,marginTop:4}}/>
            </div>
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" stroke="#f80" strokeWidth="2"/><circle cx="24" cy="20" r="6" stroke="#f80" strokeWidth="2"/><path d="M24 26c0 4 0 10 0 10" stroke="#f80" strokeWidth="2" strokeLinecap="round"/></svg>
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════
       ISSUES COMPONENTS
       ═══════════════════════════════════════════ */

    /* 5. PostArticle */
    function PostArticle() {
      return (
        <div style={{width:393,borderRadius:10,overflow:"hidden"}}>
          <div style={{position:"relative",width:"100%",minHeight:400,backgroundImage:"url('https://images.pexels.com/photos/1105766/pexels-photo-1105766.jpeg?auto=compress&cs=tinysrgb&w=800')",backgroundSize:"cover",backgroundPosition:"center",display:"flex",flexDirection:"column",padding:18}}>
            <div style={{position:"absolute",inset:0,pointerEvents:"none",background:"linear-gradient(to top, rgba(0,0,0,0.8) 15%, rgba(0,0,0,0) 70%)"}}/>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",position:"relative",zIndex:1}}>
              <div style={{width:24,height:24}}/>
              <div style={{width:120,height:29,borderRadius:3,backgroundColor:"rgba(20,24,16,0.25)",border:"0.5px solid rgba(240,232,216,1)",display:"flex",alignItems:"center",justifyContent:"center",color:"#f0e8d8",fontSize:9,fontWeight:600,letterSpacing:0.5,textTransform:"uppercase",lineHeight:"15px"}}>FOREIGN POLICY</div>
            </div>
            <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"flex-end",gap:8,position:"relative",zIndex:1,paddingTop:40}}>
              <h1 style={{color:"#fff",fontSize:38,fontWeight:900,lineHeight:"100%",letterSpacing:-1,margin:0}}>US and Israel Attack Iran for 10th Day</h1>
              <div style={{display:"flex",flexDirection:"column",gap:2}}>
                <span style={{color:T.cream,fontSize:13,fontWeight:600,lineHeight:"130%",letterSpacing:-0.5}}>Mar 11, 2026</span>
                <span style={{color:"rgba(240,232,216,0.7)",fontSize:13,fontWeight:500,lineHeight:"130%",letterSpacing:-0.5}}>Updated 8:28am EST</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* 6. AccordionItem */
    function AccordionItem({ icon, title, defaultOpen = false }) {
      const [open, setOpen] = useState(defaultOpen);
      return (
        <div style={{width:357,borderRadius:10,backgroundColor:T.warmBg,overflow:"hidden"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 18px",cursor:"pointer"}} onClick={()=>setOpen(!open)}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              {icon && <span style={{display:"flex",alignItems:"center"}}>{icon}</span>}
              <span style={{fontSize:18,fontWeight:800,color:T.slate,lineHeight:"130%",letterSpacing:-0.5}}>{title}</span>
            </div>
            <span style={{display:"flex",transform:open?"rotate(45deg)":"none",transition:"transform 0.2s"}}><IconPlus/></span>
          </div>
          {open && <div style={{padding:"0 18px 18px",fontSize:14,fontWeight:500,color:T.slate,lineHeight:"150%",letterSpacing:-0.5}}>Expandable content area. This is where consensus analysis, contention points, or other detailed information appears when the user expands this section.</div>}
        </div>
      );
    }

    /* ═══════════════════════════════════════════
       OFFICIALS COMPONENTS
       ═══════════════════════════════════════════ */

    /* 7. ScoreItem */
    function ScoreItem({ icon, title, score, maxScore, avgPercent }) {
      return (
        <div style={{width:357,padding:"16px 0",borderBottom:`1px solid ${T.cream}`,cursor:"pointer"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              {icon && <span style={{display:"flex"}}>{icon}</span>}
              <span style={{fontSize:18,fontWeight:800,color:T.slate,lineHeight:"130%",letterSpacing:-0.5}}>{title}</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{display:"flex",alignItems:"baseline"}}>
                <span style={{fontSize:22,fontWeight:700,color:T.slate,lineHeight:"130%",letterSpacing:-1}}>{score}</span>
                <span style={{fontSize:22,fontWeight:700,color:T.gray,lineHeight:"130%",letterSpacing:-1}}> /{maxScore}</span>
              </div>
              <IconChevronForward color={T.slate}/>
            </div>
          </div>
          {avgPercent != null && <div style={{marginTop:8,paddingLeft:32,position:"relative",height:20}}>
            <div style={{position:"absolute",left:`${avgPercent}%`,top:0,transform:"translateX(-50%)",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
              <div style={{width:2,height:8,backgroundColor:T.orange,borderRadius:1}}/>
              <span style={{fontSize:9,fontWeight:600,color:T.orange,letterSpacing:-0.25}}>Avg</span>
            </div>
          </div>}
        </div>
      );
    }

    /* 8. StateRow */
    function StateRow({ name }) {
      return (
        <div style={{display:"flex",alignItems:"center",gap:16,padding:"16px 18px",width:393,borderBottom:`1px solid ${T.cream}`,cursor:"pointer",backgroundColor:"transparent"}}>
          <div style={{width:48,height:32,backgroundColor:T.cream,borderRadius:2,flexShrink:0}}/>
          <span style={{flex:1,fontSize:16,fontWeight:600,color:T.slate,lineHeight:"130%",letterSpacing:-0.5}}>{name}</span>
          <IconChevronForward color={T.gray}/>
        </div>
      );
    }

    /* 9. StancesCard */
    function StancesCard({ title, subtitle, stat1Label, stat1Value, stat2Label, stat2Value }) {
      return (
        <div style={{width:357,borderRadius:10,backgroundColor:T.warmBg,padding:16,display:"flex",flexDirection:"column",gap:16}}>
          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",cursor:"pointer"}}>
            <div style={{flex:1}}>
              <h3 style={{fontSize:18,fontWeight:800,color:T.slate,lineHeight:"130%",letterSpacing:-0.5,margin:0}}>{title}</h3>
              {subtitle && <p style={{fontSize:16,fontWeight:600,color:T.slate,lineHeight:"200%",letterSpacing:-0.5,margin:0}}>{subtitle}</p>}
            </div>
            <IconChevronForward color={T.gray}/>
          </div>
          <div style={{display:"flex",gap:16}}>
            <div style={{flex:1,borderRadius:5,border:`1px solid ${T.creamBorder}`,backgroundColor:T.warmBg,padding:12,display:"flex",flexDirection:"column",gap:8}}>
              <span style={{fontSize:16,fontWeight:600,color:T.slate,lineHeight:"130%",letterSpacing:-0.5}}>{stat1Label}</span>
              <span style={{fontSize:22,fontWeight:600,color:T.slate,lineHeight:"130%",letterSpacing:-1}}>{stat1Value}</span>
            </div>
            <div style={{flex:1,borderRadius:5,border:`1px solid ${T.creamBorder}`,backgroundColor:T.warmBg,padding:12,display:"flex",flexDirection:"column",gap:8}}>
              <span style={{fontSize:16,fontWeight:600,color:T.slate,lineHeight:"130%",letterSpacing:-0.5}}>{stat2Label}</span>
              <span style={{fontSize:22,fontWeight:600,color:T.slate,lineHeight:"130%",letterSpacing:-1}}>{stat2Value}</span>
            </div>
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════
       PULSE COMPONENTS
       ═══════════════════════════════════════════ */

    /* 10. SurveyProgressBar */
    function SurveyProgressBar({ current = 2, total = 3 }) {
      return (
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8,width:357}}>
          <div style={{display:"flex",gap:4,width:"100%"}}>
            {Array.from({length:total},(_,i)=><div key={i} style={{flex:1,height:4,borderRadius:2,backgroundColor:i<current?T.slate:T.cream}}/>)}
          </div>
          <span style={{fontSize:13,fontWeight:500,color:T.gray,lineHeight:"130%",letterSpacing:-0.5}}>{current}/{total}</span>
        </div>
      );
    }

    /* 11. SurveyAnswerCard */
    function SurveyAnswerCard({ text, selected = false }) {
      const [sel, setSel] = useState(selected);
      return (
        <div onClick={()=>setSel(!sel)} style={{width:357,borderRadius:10,backgroundColor:T.warmBg,padding:"20px 18px",cursor:"pointer",border:sel?`2px solid ${T.slate}`:`1px solid ${T.cream}`,transition:"border 0.15s"}}>
          <p style={{fontSize:16,fontWeight:700,color:T.slate,lineHeight:"140%",letterSpacing:-0.5,margin:0}}>{text}</p>
        </div>
      );
    }

    /* 12. SurveyFooter */
    function SurveyFooter({ count = 6876 }) {
      return (
        <div style={{display:"flex",flexDirection:"column",gap:4,padding:"16px 0",width:357}}>
          <p style={{fontSize:16,fontWeight:700,color:T.slate,lineHeight:"130%",letterSpacing:-0.5,margin:0}}>Be Part of the Signal</p>
