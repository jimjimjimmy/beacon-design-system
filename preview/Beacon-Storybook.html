<!DOCTYPE html>
<html lang="en">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #f5f4f0; color: #141810; }

</head>

/* ═══════════════════════════════════════════════
   COMPONENTS (Figma pixel-matched)
   ═══════════════════════════════════════════════ */

/* ── 1. SectionTitle ── */
/* Figma: orange dot + Inter ExtraBold 18px title + Medium 13px subtitle + optional "View All" */
function SectionTitle({title, subtitle, showViewAll}) {
  return (
    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",width:"100%",fontFamily:"Inter,sans-serif"}}>
      <div style={{display:"flex",flexDirection:"column",gap:2,flex:1}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <IconBeaconDot/>
          <h2 style={{fontSize:18,fontWeight:800,color:T.slate,lineHeight:"130%",letterSpacing:-0.5,margin:0}}>{title}</h2>
        </div>
        {subtitle && <p style={{fontSize:13,fontWeight:500,color:T.gray,lineHeight:"130%",letterSpacing:-0.5,margin:0}}>{subtitle}</p>}
      </div>
      {showViewAll && (
        <div style={{display:"flex",alignItems:"center",gap:4,cursor:"pointer"}}>
          <span style={{fontSize:13,fontWeight:600,color:T.slate,letterSpacing:-0.5,whiteSpace:"nowrap"}}>View All</span>
          <IconChevronForward color={T.slate}/>
        </div>
      )}
    </div>
  );
}

/* ── 2. BottomTabBar ── */
/* Figma: white bg, shadow 0px -1px 20px rgba(34,34,34,0.3), pt 14, 284px centered row,
   tabs 68px (account 72px), gap 4px, pb 8, active = 4px solid #141810 bottom border,
   label: Inter SemiBold 10px, lh 15px, ls -0.25, inactive #999, active #141810 */
function BottomTabBar({activeTab="home"}) {
  const tabs = [
    {id:"home",label:"Home",Icon:IconNavHome},
    {id:"issues",label:"Issues",Icon:IconNavIssues},
    {id:"pulse",label:"Pulse",Icon:IconNavPulse},
    {id:"officials",label:"Officials",Icon:IconNavOfficials},
    {id:"account",label:"Account",Icon:IconNavAccount},
  ];
  return (
    <div style={{width:393,height:75,background:"#fff",paddingTop:14,boxShadow:"0px -1px 20px rgba(34,34,34,0.3)",display:"flex",justifyContent:"center",alignItems:"flex-start"}}>
      <div style={{display:"flex",justifyContent:"space-around",width:"100%",height:"100%"}}>
        {tabs.map(({id,label,Icon})=>{
          const a = activeTab===id;
          return (
            <div key={id} style={{display:"flex",flexDirection:"column",alignItems:"center",paddingTop:4,gap:4,cursor:"pointer",height:"100%",justifyContent:"flex-start",borderBottom:a?"4px solid #141810":"4px solid transparent",boxSizing:"border-box",minWidth:68}}>
              <Icon active={a}/>
              <span style={{fontFamily:"Inter,sans-serif",fontWeight:600,fontSize:10,lineHeight:"15px",letterSpacing:-0.25,color:a?"#141810":"#999",textAlign:"center",whiteSpace:"nowrap"}}>{label}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ── 3. BackHeader ── */
/* Figma: cream bg, 393px wide, height 48, px 18,
   title: Inter Bold 18px, color #a19a8b, centered, ls -0.5,
   back chevron left, 24px spacer right */
function BackHeader({title}) {
  return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 18px",height:48,width:393,backgroundColor:T.cream,fontFamily:"Inter,sans-serif"}}>
      <div style={{width:24,height:24,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}><IconChevronBack color="#a19a8b"/></div>
      <span style={{fontSize:18,fontWeight:700,color:"#a19a8b",lineHeight:"130%",letterSpacing:-0.5,textAlign:"center"}}>{title}</span>
      <div style={{width:24,height:24}}/>
    </div>
  );
}

      {/* Row 1: Headline + location icon */}

/* ── 6. AccordionItem ── */
/* Figma: warmBg bg, radius 10, header padding 16/18,
   icon + title: Inter ExtraBold 18px slate, ls -0.5,
   toggle: plus icon, rotates 45deg when open */
function AccordionItem({icon, title, defaultOpen=false}) {
  const [open, setOpen] = useState(defaultOpen);
  const [height, setHeight] = React.useState(defaultOpen ? null : 0);
  const contentRef = React.useRef(null);

  const toggle = () => {
    if (!open) {
      // Opening: set height to scrollHeight to animate in
      setHeight(contentRef.current.scrollHeight);
      setOpen(true);
    } else {
      // Closing: snap from scrollHeight back to 0
      setHeight(contentRef.current.scrollHeight);
      requestAnimationFrame(() => {
        requestAnimationFrame(() => setHeight(0));
      });
      setTimeout(() => setOpen(false), 280);
    }
  };

  const handleTransitionEnd = () => {
    if (open) setHeight(null); // allow natural height after open
  };

  return (
    <div style={{width:357,borderRadius:10,backgroundColor:T.warmBg,overflow:"hidden",fontFamily:"Inter,sans-serif"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 18px",cursor:"pointer"}} onClick={toggle}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          {icon && <span style={{display:"flex",alignItems:"center"}}>{icon}</span>}
          <span style={{fontSize:18,fontWeight:800,color:T.slate,lineHeight:"130%",letterSpacing:-0.5}}>{title}</span>
        </div>
        <span style={{display:"flex",transform:open?"rotate(45deg)":"rotate(0deg)",transition:"transform 0.25s ease"}}><IconPlus/></span>
      </div>
      <div
        ref={contentRef}
        onTransitionEnd={handleTransitionEnd}
        style={{
          overflow:"hidden",
          height: height === null ? "auto" : height,
          transition: "height 0.28s ease",
        }}
      >
        <div style={{padding:"0 18px 18px",fontSize:14,fontWeight:500,color:T.slate,lineHeight:"150%",letterSpacing:-0.5}}>
          Expandable content area. This is where consensus analysis, contention points, or other detailed information appears when the user expands this section.
        </div>
      </div>
    </div>
  );
}

/* Donut chart SVG — green (#39503d) is "oppose/majority", gold (#c89b3c) is minority */
function DonutChart({pct=73, size=121}) {
  const r = 44; const cx = size/2; const cy = size/2;
  const circ = 2 * Math.PI * r;
  const greenDash = (pct / 100) * circ;
  const goldDash  = circ - greenDash;
  const innerR = 28;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {/* gold segment (minority) */}
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#c89b3c" strokeWidth={16}
        strokeDasharray={`${goldDash} ${greenDash}`}
        strokeDashoffset={0} transform={`rotate(-90 ${cx} ${cy})`}/>
      {/* green segment (majority) — starts after gold */}
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#39503d" strokeWidth={16}
        strokeDasharray={`${greenDash} ${goldDash}`}
        strokeDashoffset={-goldDash} transform={`rotate(-90 ${cx} ${cy})`}/>
      {/* hollow center */}
      <circle cx={cx} cy={cy} r={innerR} fill={T.warmBg}/>
    </svg>
  );
}

            <OfficialCard name="Suzanne Bonamici" role="U.S. Representative" location="Oregon" party="D" status="tracked" score={91} bgColor="#036" imgUrl="https://images.pexels.com/photos/1239291/pexels-photo-1239291.jpeg?auto=compress&cs=tinysrgb&w=200"/>
          </div>
        </div>
        <div>
          <p className="variant-label">Pending — no score yet</p>
          <div className="canvas-wrap">
            <OfficialCard name="Lauren Boebert" role="U.S. Representative" location="Colorado" party="R" status="pending" score={null} bgColor="#de0100" imgUrl="https://images.pexels.com/photos/1239291/pexels-photo-1239291.jpeg?auto=compress&cs=tinysrgb&w=200"/>
          </div>
        </div>
      </div>
    );
    case "PoliticianProfileCard": return (
      <div style={{display:"flex",flexWrap:"wrap",gap:24,alignItems:"flex-start"}}>
        <div>
          <p className="variant-label">Republican</p>
          <div className="canvas-wrap">
            <PoliticianProfileCard name="Lauren Boebert" role="U.S. Representative · House" location="Colorado" district="4th Congressional District" party="Republican" termServed="3rd" officeSince="Jan 2021" nextElection="Nov 2026" score={81} headerColor="#de0100" imgUrl="https://images.pexels.com/photos/1239291/pexels-photo-1239291.jpeg?auto=compress&cs=tinysrgb&w=200"/>
          </div>
        </div>
        <div>
          <p className="variant-label">Democrat</p>
          <div className="canvas-wrap">
            <PoliticianProfileCard name="Suzanne Bonamici" role="U.S. Representative · House" location="Oregon" district="1st Congressional District" party="Democrat" termServed="7th" officeSince="Jan 2013" nextElection="Nov 2026" score={94} headerColor="#036" imgUrl="https://images.pexels.com/photos/1181519/pexels-photo-1181519.jpeg?auto=compress&cs=tinysrgb&w=200"/>
          </div>
        </div>
      </div>
    );
    case "ScoreItem": return (
      <div>
        <p className="variant-label">Score list</p>
        <div className="canvas-wrap">
          <div style={{backgroundColor:T.warmBg,borderRadius:10,padding:"0 18px",width:393}}>
            <ScoreItem icon={<IconVerify/>} title="Participation" score={16} maxScore={20} avgPercent={45}/>
            <ScoreItem icon={<IconUpDown/>} title="Consistency" score={34} maxScore={40} avgPercent={55}/>
            <ScoreItem icon={<IconMagicShield/>} title="Conduct" score={31} maxScore={40} avgPercent={40}/>
          </div>
        </div>
      </div>
    );
    case "StateRow": return (
      <div>
        <p className="variant-label">State list</p>
        <div className="canvas-wrap">
          <div style={{backgroundColor:T.warmBg,borderRadius:10,overflow:"hidden"}}>
            <StateRow name="Alabama"/>
            <StateRow name="Alaska"/>
            <StateRow name="Arizona"/>
            <StateRow name="California"/>
            <StateRow name="Colorado"/>
          </div>
        </div>
      </div>
    );
    case "StancesCard": return (
      <div style={{display:"flex",flexWrap:"wrap",gap:24,alignItems:"flex-start"}}>
        <div>
          <p className="variant-label">Stances</p>
          <div className="canvas-wrap">
            <StancesCard title="Stances" subtitle="Top issue positions." stat1Label="Signals" stat1Value="1,234" stat2Label="Stances" stat2Value="16"/>
          </div>
        </div>
        <div>
          <p className="variant-label">Inconsistencies</p>
          <div className="canvas-wrap">
            <StancesCard title="Inconsistencies" subtitle="No Stance Inconsistencies Detected" stat1Label="Signals" stat1Value="6" stat2Label="Stances" stat2Value="16"/>
          </div>
        </div>
      </div>
    );
    case "DataDetails": return (
      <div>
        <p className="variant-label">Participation breakdown</p>
        <div className="canvas-wrap"><DataDetails/></div>
      </div>
    );
    case "SurveyProgressBar": return (
      <div style={{display:"flex",flexWrap:"wrap",gap:24,alignItems:"flex-start"}}>
        {[[1,3],[2,3],[3,3],[1,4],[2,4]].map(([c,t])=>(
          <div key={`${c}-${t}`}>
            <p className="variant-label">Step {c} of {t}</p>
            <div className="canvas-wrap"><SurveyProgressBar current={c} total={t}/></div>
          </div>
        ))}
      </div>
    );
    case "SurveyAnswerCard": return (
      <div style={{display:"flex",flexWrap:"wrap",gap:24,alignItems:"flex-start"}}>
        <div>
          <p className="variant-label">Single-select</p>
          <div className="canvas-wrap" style={{display:"flex",flexDirection:"column",gap:20}}>
            <SurveyAnswerCard type="single" text="Not at all"/>
            <SurveyAnswerCard type="single" text="Slightly"/>
            <SurveyAnswerCard type="single" text="Somewhat" selected/>
            <SurveyAnswerCard type="single" text="Closely"/>
            <SurveyAnswerCard type="single" text="Very Closely"/>
          </div>
        </div>
        <div>
          <p className="variant-label">Multi-select</p>
          <div className="canvas-wrap" style={{display:"flex",flexDirection:"column",gap:20}}>
            <SurveyAnswerCard type="multi" text="The President acting under executive authority"/>
            <SurveyAnswerCard type="multi" text="Congress with explicit authorization"/>
            <SurveyAnswerCard type="multi" text="Joint approval between Congress and the Executive" selected/>
            <SurveyAnswerCard type="multi" text="Multinational or UN-backed authorization" selected/>
          </div>
        </div>
      </div>
    );
    case "SurveyFooter": return (
      <div style={{display:"flex",flexWrap:"wrap",gap:24,alignItems:"flex-start"}}>
        <div>
          <p className="variant-label">Default</p>
          <div className="canvas-wrap"><SurveyFooter count={6876}/></div>
        </div>
        <div>
          <p className="variant-label">Higher count</p>
          <div className="canvas-wrap"><SurveyFooter count={12450}/></div>
        </div>
      </div>
    );
    default: return null;
  }
}

function App() {
  return (
    <div style={{minHeight:"100vh",background:"#f5f4f0",fontFamily:"Inter,sans-serif"}}>
      {/* Top header */}
      <div style={{background:"#fff",borderBottom:"1px solid #e8e4de",padding:"24px 48px",position:"sticky",top:0,zIndex:100,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <h1 style={{fontSize:18,fontWeight:800,letterSpacing:-0.5,color:T.slate,margin:0}}>Beacon</h1>
          <p style={{fontSize:11,color:T.gray,margin:0,marginTop:2}}>Component Library · {SECTIONS.reduce((n,s)=>n+s.components.length,0)} components</p>
        </div>
        <div style={{display:"flex",gap:24}}>
          {SECTIONS.map(s=>(
            <a key={s.id} href={`#section-${s.id}`} style={{fontSize:13,fontWeight:600,color:T.gray,textDecoration:"none",letterSpacing:-0.25}}>{s.id}</a>
          ))}
        </div>
      </div>

      {/* Sections */}
      <div style={{padding:"48px 48px 96px"}}>
        {SECTIONS.map(section=>(
          <div key={section.id} id={`section-${section.id}`} style={{marginBottom:72}}>
            {/* Section header */}
            <div style={{display:"flex",alignItems:"baseline",gap:12,marginBottom:28,paddingBottom:12,borderBottom:"2px solid #141810"}}>
              <h2 style={{fontSize:22,fontWeight:800,letterSpacing:-0.5,color:T.slate,margin:0}}>{section.id}</h2>
              <span style={{fontSize:12,fontWeight:600,color:T.gray,letterSpacing:0.5,textTransform:"uppercase"}}>{section.components.length} components</span>
            </div>

            {/* Component grid */}
            <div style={{display:"flex",flexWrap:"wrap",gap:24,alignItems:"flex-start"}}>
              {section.components.map(comp=>(
                <div key={comp.id} style={{background:"#fff",borderRadius:16,padding:"24px",flex:"0 0 auto",maxWidth:"100%"}}>
                  <div style={{marginBottom:16}}>
                    <h3 style={{fontSize:16,fontWeight:800,letterSpacing:-0.5,color:T.slate,margin:0}}>{comp.label}</h3>
                    <p style={{fontSize:12,color:T.gray,margin:"4px 0 0",letterSpacing:-0.25}}>{comp.desc}</p>
                  </div>
                  <ComponentPreview id={comp.id}/>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
