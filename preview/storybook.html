/* ── Shared animation hook ── */
function useReveal(duration) {
  var dur = duration || 800;
  var [p, setP] = React.useState(0);
  React.useEffect(function() {
    var start = performance.now();
    var ease = function(t) { return 1 - Math.pow(1 - t, 3); };
    var rafId = { v: null };
    var tick = function(now) {
      var t = Math.min((now - start) / dur, 1);
      setP(ease(t));
      if (t < 1) rafId.v = requestAnimationFrame(tick);
    };
    rafId.v = requestAnimationFrame(tick);
    return function() { cancelAnimationFrame(rafId.v); };
  }, []);
  return p;
}

/* Figma: warmBg bg, radius 10, header padding 16/18,
   icon + title: Inter ExtraBold 18px slate, ls -0.5,
   toggle: plus icon, rotates 45deg when open */
function AccordionItem({icon, title, defaultOpen=false}) {
  const [open, setOpen] = useState(defaultOpen);
  const [height, setHeight] = React.useState(defaultOpen ? null : 0);
  const contentRef = React.useRef(null);

  const toggle = () => {
    if (!open) {
      // Opening: set height to scrollHeight to animate in
      setHeight(contentRef.current.scrollHeight);
      setOpen(true);
    } else {
      // Closing: snap from scrollHeight back to 0
      setHeight(contentRef.current.scrollHeight);
      requestAnimationFrame(() => {
        requestAnimationFrame(() => setHeight(0));
      });
      setTimeout(() => setOpen(false), 280);
    }
  };

  const handleTransitionEnd = () => {
    if (open) setHeight(null); // allow natural height after open
  };

  return (
    <div style={{width:357,borderRadius:10,backgroundColor:T.warmBg,overflow:"hidden",fontFamily:"Inter,sans-serif"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 18px",cursor:"pointer"}} onClick={toggle}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          {icon && <span style={{display:"flex",alignItems:"center"}}>{icon}</span>}
          <span style={{fontSize:18,fontWeight:800,color:T.slate,lineHeight:"130%",letterSpacing:-0.5}}>{title}</span>
        </div>
        <span style={{display:"flex",transform:open?"rotate(45deg)":"rotate(0deg)",transition:"transform 0.25s ease"}}><IconPlus/></span>
      </div>
      <div
        ref={contentRef}
        onTransitionEnd={handleTransitionEnd}
        style={{
          overflow:"hidden",
          height: height === null ? "auto" : height,
          transition: "height 0.28s ease",
        }}
      >
        <div style={{padding:"0 18px 18px",fontSize:14,fontWeight:500,color:T.slate,lineHeight:"150%",letterSpacing:-0.5}}>
          Expandable content area. This is where consensus analysis, contention points, or other detailed information appears when the user expands this section.
        </div>
      </div>
    </div>
  );
}

/* Donut chart SVG — green (#39503d) is "oppose/majority", gold (#c89b3c) is minority */
function DonutChart({pct=73, size=121}) {
  const r = 44; const cx = size/2; const cy = size/2;
  const circ = 2 * Math.PI * r;
  const greenDash = (pct / 100) * circ;   // green = majority, starts at 12 o'clock
  const goldDash  = circ - greenDash;      // gold  = minority, follows green
  const innerR = 28;
  const clipId = React.useRef('dc_' + Math.random().toString(36).slice(2,7)).current;
  const p = useReveal(1200);
  // Phase 1 (0→0.72): green sweeps in   Phase 2 (0.72→1): gold staggers in
  const SPLIT = 0.72;
  const greenP = Math.min(p / SPLIT, 1);
  const goldP  = Math.max(0, (p - SPLIT) / (1 - SPLIT));
  const deg = greenP * (pct / 100) * 360 + goldP * ((100 - pct) / 100) * 360;
  const rad = (deg - 90) * Math.PI / 180;
  const clipR = r + 20;
  const ex = cx + clipR * Math.cos(rad);
  const ey = cy + clipR * Math.sin(rad);
  const largeArc = deg > 180 ? 1 : 0;
  const fanPath = deg >= 359.9
    ? null
    : `M ${cx} ${cy} L ${cx} ${cy - clipR} A ${clipR} ${clipR} 0 ${largeArc} 1 ${ex} ${ey} Z`;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <defs>{fanPath && <clipPath id={clipId}><path d={fanPath}/></clipPath>}</defs>
      <g clipPath={fanPath ? `url(#${clipId})` : undefined}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#39503d" strokeWidth={16}
          strokeDasharray={`${greenDash} ${goldDash}`}
          strokeDashoffset={0} transform={`rotate(-90 ${cx} ${cy})`}/>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#c89b3c" strokeWidth={16}
          strokeDasharray={`${goldDash} ${greenDash}`}
          strokeDashoffset={-greenDash} transform={`rotate(-90 ${cx} ${cy})`}/>
      </g>
      <circle cx={cx} cy={cy} r={innerR} fill={T.warmBg}/>
    </svg>
  );
}

      </div>
    </div>
  );

const REACTION_LABELS = ["Reassured","Surprised","Skeptical","Concerned","Outraged"];

function ReactionInteraction() {
  const [open, setOpen] = React.useState(false);
  const [selected, setSelected] = React.useState(null);
  const [hovered, setHovered] = React.useState(null);
  const SLIDE_W = 154;

  const toggle = () => setOpen(o => !o);

  const pick = (label) => {
    setSelected(s => s === label ? null : label);
    setTimeout(() => setOpen(false), 300);
  };

  return (
    <div style={{position:"relative", width:357, fontFamily:"Inter,sans-serif"}}>

      {/* ── Reaction strip — behind card, stretches to card height ── */}
      <div style={{
        position:"absolute", right:0, top:0, bottom:0, width:SLIDE_W,
        display:"flex", flexDirection:"column", gap:10,
        alignItems:"flex-end", justifyContent:"center", padding:20,
        zIndex:1, boxSizing:"border-box", backgroundColor:T.cream,
      }}>
        {REACTION_LABELS.map((label) => {
          const isSel = selected === label;
          const isHov = hovered === label;
          return (
            <button key={label} onClick={() => pick(label)}
              onMouseEnter={() => setHovered(label)}
              onMouseLeave={() => setHovered(null)}
              style={{
                display:"flex", gap:8, alignItems:"center",
                background:"none", border:"none", cursor:"pointer",
                padding:0, fontFamily:"Inter,sans-serif",
              }}>
              <span style={{
                fontSize:13, fontWeight: isSel ? 600 : 400,
                color: isSel ? T.slate : T.gray,
                letterSpacing:-0.25, lineHeight:"1.1", whiteSpace:"nowrap",
              }}>{label}</span>
              <div style={{
                width:40, height:40, borderRadius:48, flexShrink:0,
                backgroundColor: isSel ? "#fafafa" : isHov ? "#f0ece4" : "transparent",
                transition:"background-color 150ms ease",
                display:"flex", alignItems:"center", justifyContent:"center",
              }}>
                <div style={{width:24, height:24, display:"flex", alignItems:"center", justifyContent:"center", overflow:"hidden"}}>
                  {REACTION_ICONS[label]}
                </div>
              </div>
            </button>
          );
        })}
      </div>

      {/* ── Sliding PollCard — z:2, clips and translates ── */}
      <div style={{
        position:"relative", zIndex:2,
        borderRadius:10, overflow:"hidden",
        transform: open ? `translateX(-${SLIDE_W}px)` : "translateX(0)",
        transition:"transform 280ms cubic-bezier(0.4,0,0.2,1)",
      }}>
        <PollCard
          width={357}
          question="U.S. vs. Maduro: Smart Move or Crossing the Line?"
          category="foreign policy"
          timeLabel="Takes ~ 1 min"
          subtext="At 10,000 responses, anonymous results are shared with your congressman."
          shares="842.3k"
          onReactionToggle={toggle}
          reactionOpen={open}
          reactionSelected={selected}
        />
      </div>
    </div>
  );
}

/* ── DetailAccordion — controlled accordion for IssueDetailScreen ── */
function DetailAccordion({icon, title, isOpen, onToggle, children}) {
  const [height, setHeight] = React.useState(isOpen ? null : 0);
  const contentRef = React.useRef(null);
  const prevRef = React.useRef(isOpen);

  React.useEffect(() => {
    if (prevRef.current === isOpen) return;
    prevRef.current = isOpen;
    if (isOpen) {
      setHeight(contentRef.current.scrollHeight);
      const t = setTimeout(() => setHeight(null), 320);
      return () => clearTimeout(t);
    } else {
      setHeight(contentRef.current.scrollHeight);
      requestAnimationFrame(() => requestAnimationFrame(() => setHeight(0)));
    }
  }, [isOpen]);

  return (
    <div style={{backgroundColor:T.warmBg,borderRadius:10,overflow:"hidden",fontFamily:"Inter,sans-serif",boxShadow:T.shadow}}>
      <div onClick={onToggle} style={{display:"flex",alignItems:"center",gap:10,padding:"14px 18px",cursor:"pointer"}}>
        <span style={{display:"flex",flexShrink:0}}>{icon}</span>
        <span style={{flex:1,fontSize:18,fontWeight:800,color:T.slate,lineHeight:1.3,letterSpacing:-0.5}}>{title}</span>
        <span style={{display:"flex",transform:isOpen?"rotate(45deg)":"rotate(0deg)",transition:"transform 0.25s ease"}}>
          <IconPlus/>
        </span>
      </div>
      <div ref={contentRef} style={{overflow:"hidden",height:height===null?"auto":height,transition:"height 0.3s ease"}}>
        <div style={{padding:"0 18px 20px"}}>
          {children}
        </div>
      </div>
    </div>
  );
}

function ContentionSubRow({title, defaultOpen=false, isLast=false}) {
  const [open, setOpen] = React.useState(defaultOpen);
  const [height, setHeight] = React.useState(defaultOpen ? null : 0);
  const contentRef = React.useRef(null);
  const body = "The ongoing war has involved strikes on Iranian sites and retaliatory actions, with reports of casualties among U.S. service members.";

function VotingTimeline({
  title = "Voting Timeline",
  bars = [
    {month:"Sep", year:"'25", yeaPct:0.30},
    {month:"Oct", year:"'25", yeaPct:0.20},
    {month:"Nov", year:"'25", yeaPct:0.25},
    {month:"Dec", year:"'25", yeaPct:0.50},
    {month:"Jan", year:"'26", yeaPct:0.35},
    {month:"Feb", year:"'26", yeaPct:0.05},
  ]
}) {
  const BAR_H = 160;
  const legend = [
    {label:"Yea",        color:"#00b34a"},
    {label:"Nay",        color:"#ff5500"},
    {label:"Absent",     color:"#c5c5c5"},
    {label:"Not Voting", color:"#1a5e52"},
  ];
  return (
    <div style={{
      backgroundColor:T.warmBg, borderRadius:T.radius, padding:16,
      display:"flex", flexDirection:"column", gap:16, fontFamily:"Inter,sans-serif",
    }}>
      <span style={{fontWeight:800, fontSize:18, color:T.slate, letterSpacing:-0.5, lineHeight:1.3}}>
        {title}
      </span>
      {/* Bars */}
      <div style={{display:"flex", gap:32, alignItems:"center", justifyContent:"flex-end", overflow:"hidden", paddingLeft:8, paddingRight:8}}>
        {bars.map((bar, i) => {
          const isLatest = i === bars.length - 1;
          const yeaH = Math.round(bar.yeaPct * BAR_H);
          return (
            <div key={i} style={{display:"flex", flexDirection:"column", gap:8, alignItems:"center", flexShrink:0}}>
              <div style={{width:12, height:BAR_H, backgroundColor:"#ff5500", borderRadius:1, overflow:"hidden", display:"flex", flexDirection:"column"}}>
                <div style={{height: BAR_H - yeaH, flexShrink:0}}/>
                <div style={{flex:1, backgroundColor:"#00b34a"}}/>
              </div>
              <div style={{display:"flex", flexDirection:"column", alignItems:"center", lineHeight:1.3}}>
                <span style={{fontSize:isLatest ? 14 : 13, fontWeight:isLatest ? 600 : 700, color:T.slate, letterSpacing:-0.5, whiteSpace:"nowrap"}}>{bar.month}</span>
                <span style={{fontSize:12, fontWeight:600, color:T.slate, letterSpacing:-0.5, whiteSpace:"nowrap"}}>{bar.year}</span>
              </div>
            </div>
          );
        })}
      </div>
      {/* Legend */}
      <div style={{display:"flex", gap:24, alignItems:"center", justifyContent:"center"}}>
        {legend.map(({label, color}) => (
          <div key={label} style={{display:"flex", gap:8, alignItems:"center"}}>
            <div style={{width:12, height:12, borderRadius:"50%", backgroundColor:color, flexShrink:0}}/>
            <span style={{fontSize:13, fontWeight:500, color:T.slate, opacity:0.8, letterSpacing:-0.5, whiteSpace:"nowrap"}}>{label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── PulseSurveyQuestion ── Figma 5935:33602 / 5935:33583.
   Full-screen single-select survey question · chevron back + progress bar + close +
   step counter · title (Inter Black 20) · N SurveyAnswerCards · footer · Pulse tab.
   Props let reuse for step 1/3, 2/3, etc. */
function PulseSurveyQuestion({
  step=1, total=3, prevStep=0,
  title="How closely have you been following news about the reported U.S. operation related to Venezuela's leadership?",
  options=["Not at all","Slightly","Somewhat","Closely","Very Closely"],
  mode="single",
  doneLabel="Done",
  onAnswer=null,
}={}) {
  const [selected, setSelected] = React.useState(mode === "multi" ? new Set() : null);
  const [barPct, setBarPct] = React.useState((prevStep/total)*100);
  const [mounted, setMounted] = React.useState(false);
  const [leaving, setLeaving] = React.useState(false);
  React.useEffect(() => {
    const t = setTimeout(() => { setBarPct((step/total)*100); setMounted(true); }, 80);
    return () => clearTimeout(t);
  }, [step, total]);
  function handleSelect(i) {
    if (mode === "multi") {
      setSelected(prev => {
        const next = new Set(prev);
        if (next.has(i)) next.delete(i); else next.add(i);
        return next;
      });
      return;
    }
    if (selected !== null) return;
    setSelected(i);
    if (onAnswer) {
      setTimeout(() => setLeaving(true), 450);
      setTimeout(() => onAnswer(i), 900);
    }
  }
  function handleDone() {
    if (leaving) return;
    setTimeout(() => setLeaving(true), 50);
    setTimeout(() => onAnswer && onAnswer(selected), 500);
  }
  const isSelected = i => mode === "multi" ? selected.has(i) : selected === i;
  return (
    <div style={{width:393,height:852,position:"relative",overflow:"hidden",fontFamily:"Inter,sans-serif",backgroundColor:T.cream}}>
      <div className="hide-scrollbar" style={{position:"absolute",top:0,left:0,right:0,bottom:75,overflowY:"auto",overflowX:"hidden",scrollbarWidth:"none"}}>

          <span style={{fontSize:12,fontWeight:700,color:T.slate}}>5G ▪▪▪ 🔋</span>
        </div>

        {/* Progress header: back · bar · close, then 1/3 centered */}
        <div style={{padding:"16px 18px 0",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
          <div style={{display:"flex",alignItems:"center",gap:16,width:"100%"}}>
            <IconChevronBack/>
            <div style={{flex:1,height:6,borderRadius:50,backgroundColor:T.creamBorder,overflow:"hidden"}}>
              <div style={{width:`${barPct}%`,height:"100%",backgroundColor:T.slate,borderRadius:50,transition:"width 0.9s cubic-bezier(0.4,0,0.2,1)"}}/>
            </div>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" style={{display:"block"}}>
              <path d="M6 6L18 18M18 6L6 18" stroke="#141810" strokeWidth="1.5" strokeLinecap="round"/>
            </svg>
          </div>
          <span style={{fontSize:16,fontWeight:700,color:T.gray,lineHeight:"1.3",marginTop:4}}>{step}/{total}</span>
        </div>

        {/* Title */}
        <div style={{padding:"16px 50px 0 18px"}}>
          <p style={{fontSize:20,fontWeight:900,color:T.slate,lineHeight:"1.3",letterSpacing:-0.5,margin:0}}>
            {title}
          </p>
        </div>

        {/* Answer cards — stagger fade in top → bottom */}
        <div style={{padding:"32px 18px 0",display:"flex",flexDirection:"column",gap:20}}>
          {options.map((text,i)=>{
            const visible = mounted && !leaving;
            const enterDelay = 500 + i*110;
            const exitDelay = i*60;
            const sel = isSelected(i);
            return (
              <div key={i} onClick={()=>handleSelect(i)} style={{
                width:"100%",borderRadius:10,
                backgroundColor:sel?"#ffffff":T.warmBg,
                padding:"18px 12px",cursor:"pointer",
                boxShadow:"0px 4px 15px 0px rgba(0,0,0,0.15)",
                boxSizing:"border-box",
                opacity:visible?1:0,
                transform:visible?"translateY(0)":(leaving?"translateY(-8px)":"translateY(10px)"),
                transition:`background-color 0.15s, opacity 0.4s ease ${leaving?exitDelay:enterDelay}ms, transform 0.4s ease ${leaving?exitDelay:enterDelay}ms`,
                display:"flex",alignItems:"center",gap:8
              }}>
                <p style={{flex:1,fontSize:18,fontWeight:800,color:T.slate,lineHeight:"1.3",letterSpacing:-0.5,margin:0}}>{text}</p>
                {mode==="multi" && (
                  <div style={{width:22,height:22,borderRadius:"50%",flexShrink:0,backgroundColor:sel?T.slate:"transparent",border:sel?"none":"1.5px solid #c8c0b8",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    {sel && <svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4.5L4.33 8L11 1" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                  </div>
                )}
              </div>
            );
          })}
          {mode==="multi" && (
            <button onClick={handleDone} disabled={selected.size===0} style={{
              marginTop:12,width:"100%",height:47,borderRadius:8,
              backgroundColor:selected.size===0?"#888":T.slate,color:"#fff",
              fontFamily:"Inter,sans-serif",fontSize:16,fontWeight:700,letterSpacing:-0.5,
              border:"none",cursor:selected.size===0?"default":"pointer",
              opacity:mounted && !leaving ? 1 : 0,
              transform:mounted && !leaving ? "translateY(0)" : (leaving?"translateY(-8px)":"translateY(10px)"),
              transition:`background-color 0.2s, opacity 0.4s ease ${leaving?options.length*60:500+options.length*110}ms, transform 0.4s ease ${leaving?options.length*60:500+options.length*110}ms`

      <div style={{position:"absolute",bottom:0,left:0,right:0,zIndex:20}}>
        <BottomTabBar activeTab="pulse"/>
      </div>
    </div>
  );
}


/* ── PulseSurveyFlow ── chains Q1 (5935:33602) → Q2 (5935:33583) → Q3 multi (5935:33621) → Results.
   Selecting advances the step, bar animates, cards cascade. Last step is multi-select
   with Done → results card. */
function PulseSurveyFlow() {
  const steps = [
    {
      title: "How closely have you been following news about the reported U.S. operation related to Venezuela's leadership?",
      options: ["Not at all","Slightly","Somewhat","Closely","Very Closely"],
      mode: "single",
    },
    {
      title: "Who do you believe should have the authority to approve an operation like this?",
      options: [
        "The President acting under executive authority",
        "Congress with explicit authorization",
        "Joint approval between Congress and the Executive",
        "Multinational or UN-backed authorization",
      ],
      mode: "single",
    },
    {
      title: "Which potential impact of this action concerns you the most?",
      options: [
        "The President acting under executive authority",
        "Congress with explicit authorization",
        "Joint approval between Congress and the Executive",
        "Multinational or UN-backed authorization",
      ],
      mode: "multi",
    },
  ];
  const [idx, setIdx] = React.useState(0);
  const [done, setDone] = React.useState(false);
  if (done) return <PulseSurveyResults onReturn={() => { setIdx(0); setDone(false); }}/>;
  const cur = steps[idx];
  const advance = () => {
    if (idx < steps.length - 1) setIdx(i => i + 1);
    else setDone(true);
  };
  return (
    <PulseSurveyQuestion
      key={idx}
      step={idx+1}
      total={steps.length}
      prevStep={idx}
      title={cur.title}
      options={cur.options}
      mode={cur.mode}
      onAnswer={advance}
    />
  );
}

            display:"flex",alignItems:"center",gap:5,flexShrink:0,
            fontSize:11,fontWeight:700,color:T.slate,letterSpacing:-0.25,
            background:T.cream,border:"none",borderRadius:6,
            padding:"6px 10px",cursor:"pointer",marginTop:1,
            fontFamily:"Inter,sans-serif"
          }}>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
              <path d="M3 3v5h5"/>
            </svg>
            {comp.id === "ReactionInteraction" ? "Reset" : "Replay"}
          </button>
        )}
      </div>}
      <div style={{position:"relative"}}>
        <ComponentPreview id={comp.id} key={replayKey}/>
        {hasAnim && isFullScreen && (
          <button onClick={()=>setReplayKey(k=>k+1)} style={{
            position:"absolute",top:12,right:12,zIndex:10,
            display:"flex",alignItems:"center",gap:5,
            fontSize:11,fontWeight:700,color:T.slate,letterSpacing:-0.25,
            background:T.cream,border:"none",borderRadius:6,
            padding:"6px 10px",cursor:"pointer",
            fontFamily:"Inter,sans-serif",boxShadow:T.shadow
          }}>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
              <path d="M3 3v5h5"/>
            </svg>
            Replay
          </button>
        )}
      </div>
    </div>
  );
}

function App() {
  const groups = [...new Set(SECTIONS.map(s => s.group))];
  const byGroup = g => SECTIONS.filter(s => s.group === g);
  const componentCount = SECTIONS.filter(s => s.group === "Components").reduce((n,s) => n+s.components.length, 0);
  const screenCount = SECTIONS.filter(s => s.group === "Mobile" || s.group === "Desktop").reduce((n,s) => n+s.components.length, 0);

  // Find first non-empty section as default
  const firstNonEmpty = SECTIONS.find(s => s.components.length > 0);
  const defaultKey = firstNonEmpty ? `${firstNonEmpty.group}:${firstNonEmpty.id}` : "";

  // Read initial selection from URL hash
  const readHash = () => {
    const h = (window.location.hash || "").replace(/^#/, "");
    if (!h) return defaultKey;
    // Find matching section
    const match = SECTIONS.find(s => `${s.group}:${s.id}` === h);
    return match ? h : defaultKey;
  };

  const [selected, setSelected] = React.useState(readHash);
  const [expanded, setExpanded] = React.useState(new Set(groups));

  React.useEffect(() => {
    const onHash = () => setSelected(readHash());
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);

  const pick = (group, id) => {
    const key = `${group}:${id}`;
    setSelected(key);
    window.location.hash = key;
  };

  const toggleGroup = (g) => {
    const next = new Set(expanded);
    next.has(g) ? next.delete(g) : next.add(g);
    setExpanded(next);
  };

  const [gKey, sKey] = selected.split(":");
  const currentSection = SECTIONS.find(s => s.group === gKey && s.id === sKey);

  return (
    <div style={{display:"flex",minHeight:"100vh",background:"#f5f4f0",fontFamily:"Inter,sans-serif"}}>
      {/* Left nav */}
      <aside style={{width:240,background:"#fff",borderRight:"1px solid #e8e4de",position:"sticky",top:0,alignSelf:"flex-start",height:"100vh",overflowY:"auto",flexShrink:0,padding:"20px 0"}}>
        <div style={{padding:"0 20px 20px",borderBottom:`1px solid ${T.creamBorder}`,marginBottom:12}}>
          <h1 style={{fontSize:18,fontWeight:900,letterSpacing:-0.5,color:T.slate,margin:0}}>Beacon</h1>
          <p style={{fontSize:11,color:T.gray,margin:"2px 0 0"}}>{componentCount} components · {screenCount} screens</p>
        </div>
        {groups.map(group => {
          const isExp = expanded.has(group);
          const sections = byGroup(group);
          const totalCount = sections.reduce((n,s)=>n+s.components.length,0);
          return (
            <div key={group} style={{marginBottom:4}}>
              <button
                onClick={()=>toggleGroup(group)}
                style={{display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%",padding:"10px 20px",background:"transparent",border:"none",fontFamily:"Inter,sans-serif",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:0.8,color:T.slate,cursor:"pointer"}}
              >
                <span style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{display:"inline-block",transform:isExp?"rotate(90deg)":"rotate(0deg)",transition:"transform 0.15s",fontSize:10,color:T.gray}}>▸</span>
                  {group}
                </span>
                <span style={{fontSize:10,color:T.gray,fontWeight:600}}>{totalCount}</span>
              </button>
              {isExp && sections.map(s => {
                const key = `${s.group}:${s.id}`;
                const active = selected === key;
                const empty = s.components.length === 0;
                return (
                  <button
                    key={s.id}
                    onClick={()=>pick(s.group, s.id)}
                    style={{
                      display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%",textAlign:"left",
                      padding:"7px 20px 7px 40px",
                      background:active?"#f5f4f0":"transparent",
                      borderLeft:`3px solid ${active?T.slate:"transparent"}`,
                      marginLeft:0,border:"none",borderRadius:0,
                      fontFamily:"Inter,sans-serif",fontSize:13,
                      fontWeight:active?700:500,
                      color:empty?"#bbb":(active?T.slate:"#555"),
                      cursor:"pointer",
                    }}
                  >
                    <span>{s.id}</span>
                    <span style={{fontSize:11,color:T.gray,fontWeight:500}}>{s.components.length || "—"}</span>
                  </button>
                );
              })}
            </div>
          );
        })}
      </aside>

      {/* Main canvas */}
      <main style={{flex:1,minWidth:0,padding:"48px 56px 96px"}}>
        {currentSection ? (
          <>
            <div style={{marginBottom:40,paddingBottom:16,borderBottom:`3px solid ${T.slate}`}}>
              <p style={{fontSize:11,fontWeight:700,color:T.gray,letterSpacing:1,textTransform:"uppercase",margin:0}}>{currentSection.group}</p>
              <div style={{display:"flex",alignItems:"baseline",gap:12,marginTop:4}}>
                <h1 style={{fontSize:32,fontWeight:900,letterSpacing:-1,color:T.slate,margin:0}}>{currentSection.id}</h1>
                <span style={{fontSize:12,fontWeight:600,color:T.gray,letterSpacing:0.5,textTransform:"uppercase"}}>
                  {currentSection.components.length} {currentSection.components.length === 1 ? "item" : "items"}
                </span>
              </div>
            </div>
            {currentSection.components.length > 0 ? (
              <div style={{display:"flex",flexWrap:"wrap",gap:24,alignItems:"flex-start"}}>
                {currentSection.components.map(comp => (
                  <ComponentCard key={comp.id} comp={comp}/>
                ))}
              </div>
            ) : (
              <p style={{color:T.gray,fontSize:14,fontStyle:"italic"}}>Nothing here yet — placeholder section.</p>
            )}
          </>
        ) : (
          <p style={{color:T.gray}}>Select a section from the sidebar.</p>
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
