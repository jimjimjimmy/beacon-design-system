  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #f5f4f0; color: #141810; }
    #root { min-height: 100vh; }
    .variant-label { font-size: 10px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 0.75px; margin-bottom: 10px; }
    .canvas-wrap { background: #f0e8d8; border-radius: 12px; padding: 20px; display: inline-flex; flex-direction: column; gap: 16px; }
    a { color: inherit; }
    .hide-scrollbar::-webkit-scrollbar { display:none; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

/* ═══════════════════════════════════════════════
   DESIGN TOKENS
   ═══════════════════════════════════════════════ */
const T = {
  cream:"#f0e8d8", slate:"#141810", white:"#fafafa", red:"#de0100",
  orange:"#f80", deepGreen:"#39503d", gray:"#999", warmBg:"#fff9ed",
  creamBorder:"#e9e1d3", shadow:"0 4px 15px rgba(0,0,0,0.15)", radius:10,
};

/* ── Shared animation hook ── */
function useReveal(duration) {
  var dur = duration || 800;
  var [p, setP] = React.useState(0);
  React.useEffect(function() {
    var start = performance.now();
    var ease = function(t) { return 1 - Math.pow(1 - t, 3); };
    var rafId = { v: null };
    var tick = function(now) {
      var t = Math.min((now - start) / dur, 1);
      setP(ease(t));
      if (t < 1) rafId.v = requestAnimationFrame(tick);
    };
    rafId.v = requestAnimationFrame(tick);
    return function() { cancelAnimationFrame(rafId.v); };
  }, []);
  return p;
}

/* Page-level fade-in + slide-up transition.
   Matches the pulse-survey entry feel: opacity 0→1, translateY(16px→0),
   0.55s ease-out. Plays whenever the element enters the viewport's
   upper band, and re-arms when it fully leaves. Driven imperatively
   via ref so React's update batching can't swallow the opacity:0
   paint (which would skip the transition).

   Returns [ref, styleObj]. Attach ref={ref} to the fading element and
   spread styleObj into its inline style. */

/* ── DesktopTab / DesktopTabRow ──
   Shared tab styling for any 1280 desktop screen. Matches the pattern used by
   DesktopPulseSurveysScreen (7096:57163). Row has a 1px bottom border; active
   tab has a 4px bottom border slate that overlaps the row border (marginBottom:-1).
   Tab cells stretch to full row height so the underline sits ON the row line. */
function DesktopTabRow({ children, style }) {
  return (
    <div style={{
      width:"100%", height:37, display:"flex", alignItems:"center",
      position:"relative", borderBottom:`1px solid ${T.slate}`,
      ...style,
    }}>{children}</div>
  );
}
function DesktopTab({ value, activeValue, label, onClick, width, extraStyle }) {
  const active = value === activeValue;
  return (
    <div onClick={() => onClick && onClick(value)} style={{
      padding:8, cursor:"pointer",
      display:"flex", alignItems:"center", justifyContent:"center",
      height:"100%", marginBottom:-1,
      borderBottom: active ? `4px solid ${T.slate}` : "4px solid transparent",
      ...(width ? { width } : null),
      ...(extraStyle || null),
    }}>
      <span style={{
        fontSize:16, fontWeight:600, color:T.slate,
        letterSpacing:-0.5, lineHeight:1.3, whiteSpace:"nowrap",
      }}>{label}</span>
    </div>
  );
}

function usePageFadeIn() {
  var ref = React.useRef(null);
  var playRef = React.useRef(function(){});
  React.useEffect(function() {
    var el = ref.current;
    if (!el) return;
    var armed = true;
    var EASE = "cubic-bezier(0.22,1,0.36,1)";
    var DUR = "0.55s";
    function play() {
      // Snap to initial state with transitions OFF, force reflow, then apply
      // the target state WITH transitions - guarantees a transition, never
      // a jump-cut.
      el.style.transition = "none";
      el.style.opacity = "0";
      el.style.transform = "translateY(16px)";
      void el.offsetHeight; // force reflow
      el.style.transition = "opacity " + DUR + " " + EASE + ", transform " + DUR + " " + EASE;
      el.style.opacity = "1";
      el.style.transform = "translateY(0)";
    }
    playRef.current = play;
    function check() {
      var r = el.getBoundingClientRect();
      var vh = window.innerHeight || document.documentElement.clientHeight;
      var topEntered = r.top > -vh * 0.25 && r.top < vh * 0.85;
      var outOfZone = r.top < -vh * 0.25 || r.top > vh;
      if (topEntered && armed) {
        armed = false;
        play();
      } else if (outOfZone && !armed) {
        armed = true;
      }
    }
    check();
    window.addEventListener("scroll", check, { passive: true });
    window.addEventListener("resize", check);
    return function() {
      window.removeEventListener("scroll", check);
      window.removeEventListener("resize", check);
    };
  }, []);
  // replay() lets tab-switch handlers re-trigger the fade imperatively.
  var replay = React.useCallback(function() { playRef.current(); }, []);
  return [ref, {
    opacity: 0,
    transform: "translateY(16px)",
    willChange: "opacity, transform",
  }, replay];
}

/* Figma: warmBg bg, radius 10, header padding 16/18,
   icon + title: Inter ExtraBold 18px slate, ls -0.5,
   toggle: plus icon, rotates 45deg when open */
function AccordionItem({icon, title, defaultOpen=false}) {
  const [open, setOpen] = useState(defaultOpen);
  const [height, setHeight] = React.useState(defaultOpen ? null : 0);
  const contentRef = React.useRef(null);

  const toggle = () => {
    if (!open) {
      // Opening: set height to scrollHeight to animate in
      setHeight(contentRef.current.scrollHeight);
      setOpen(true);
    } else {
      // Closing: snap from scrollHeight back to 0
      setHeight(contentRef.current.scrollHeight);
      requestAnimationFrame(() => {
        requestAnimationFrame(() => setHeight(0));
      });
      setTimeout(() => setOpen(false), 280);
    }
  };

  const handleTransitionEnd = () => {
    if (open) setHeight(null); // allow natural height after open
  };

  return (
    <div style={{width:357,borderRadius:10,backgroundColor:T.warmBg,overflow:"hidden",fontFamily:"Inter,sans-serif"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 18px",cursor:"pointer"}} onClick={toggle}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          {icon && <span style={{display:"flex",alignItems:"center"}}>{icon}</span>}
          <span style={{fontSize:18,fontWeight:800,color:T.slate,lineHeight:"130%",letterSpacing:-0.5}}>{title}</span>
        </div>
        <span style={{display:"flex",transform:open?"rotate(45deg)":"rotate(0deg)",transition:"transform 0.25s ease"}}><IconPlus/></span>
      </div>
      <div
        ref={contentRef}
        onTransitionEnd={handleTransitionEnd}
        style={{
          overflow:"hidden",
          height: height === null ? "auto" : height,
          transition: "height 0.28s ease",
        }}
      >
        <div style={{padding:"0 18px 18px",fontSize:14,fontWeight:500,color:T.slate,lineHeight:"150%",letterSpacing:-0.5}}>
          Expandable content area. This is where consensus analysis, contention points, or other detailed information appears when the user expands this section.
        </div>
      </div>
    </div>
  );
}

/* Donut chart SVG - green (#39503d) is "oppose/majority", gold (#c89b3c) is minority */
function DonutChart({pct=73, size=121}) {
  const r = 44; const cx = size/2; const cy = size/2;
  const circ = 2 * Math.PI * r;
  const greenDash = (pct / 100) * circ;   // green = majority, starts at 12 o'clock
  const goldDash  = circ - greenDash;      // gold  = minority, follows green
  const innerR = 28;
  const clipId = React.useRef('dc_' + Math.random().toString(36).slice(2,7)).current;
  const p = useReveal(1200);
  // Phase 1 (0→0.72): green sweeps in   Phase 2 (0.72→1): gold staggers in
  const SPLIT = 0.72;
  const greenP = Math.min(p / SPLIT, 1);
  const goldP  = Math.max(0, (p - SPLIT) / (1 - SPLIT));
  const deg = greenP * (pct / 100) * 360 + goldP * ((100 - pct) / 100) * 360;
  const rad = (deg - 90) * Math.PI / 180;
  const clipR = r + 20;
  const ex = cx + clipR * Math.cos(rad);
  const ey = cy + clipR * Math.sin(rad);
  const largeArc = deg > 180 ? 1 : 0;
  const fanPath = deg >= 359.9
    ? null
    : `M ${cx} ${cy} L ${cx} ${cy - clipR} A ${clipR} ${clipR} 0 ${largeArc} 1 ${ex} ${ey} Z`;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <defs>{fanPath && <clipPath id={clipId}><path d={fanPath}/></clipPath>}</defs>
      <g clipPath={fanPath ? `url(#${clipId})` : undefined}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#39503d" strokeWidth={16}
          strokeDasharray={`${greenDash} ${goldDash}`}
          strokeDashoffset={0} transform={`rotate(-90 ${cx} ${cy})`}/>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#c89b3c" strokeWidth={16}
          strokeDasharray={`${goldDash} ${greenDash}`}
          strokeDashoffset={-greenDash} transform={`rotate(-90 ${cx} ${cy})`}/>
      </g>
      <circle cx={cx} cy={cy} r={innerR} fill={T.warmBg}/>
    </svg>
  );
}

            </div>
          ))}
          {/* Total row */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingTop:16,paddingBottom:16,borderBottom:"1px solid "+T.slate}}>
            <p style={{fontSize:14,fontWeight:600,color:"#000",lineHeight:"130%",letterSpacing:-0.5,margin:0}}>Total Deducted from {maxScore}</p>
            <p style={{fontSize:14,fontWeight:600,color:"#000",lineHeight:"130%",letterSpacing:-0.5,margin:0}}>{totalDeducted}</p>
          </div>
        </div>
        {/* Source */}
        <p style={{fontSize:10,fontWeight:500,color:T.gray,lineHeight:"130%",letterSpacing:-0.5,margin:0}}>{source}</p>
      </div>
    </div>
  );
}

const REACTION_LABELS = ["Reassured","Surprised","Skeptical","Concerned","Outraged"];

function ReactionInteraction() {
  const [open, setOpen] = React.useState(false);
  const [selected, setSelected] = React.useState(null);
  const [hovered, setHovered] = React.useState(null);
  const SLIDE_W = 154;

  const toggle = () => setOpen(o => !o);

  const pick = (label) => {
    setSelected(s => s === label ? null : label);
    setTimeout(() => setOpen(false), 300);
  };

  return (
    <div style={{position:"relative", width:357, fontFamily:"Inter,sans-serif"}}>

      {/* ── Reaction strip - behind card, stretches to card height ── */}
      <div style={{
        position:"absolute", right:0, top:0, bottom:0, width:SLIDE_W,
        display:"flex", flexDirection:"column", gap:10,
        alignItems:"flex-end", justifyContent:"center", padding:20,
        zIndex:1, boxSizing:"border-box", backgroundColor:T.cream,
      }}>
        {REACTION_LABELS.map((label) => {
          const isSel = selected === label;
          const isHov = hovered === label;
          return (
            <button key={label} onClick={() => pick(label)}
              onMouseEnter={() => setHovered(label)}
              onMouseLeave={() => setHovered(null)}
              style={{
                display:"flex", gap:8, alignItems:"center",
                background:"none", border:"none", cursor:"pointer",
                padding:0, fontFamily:"Inter,sans-serif",
              }}>
              <span style={{
                fontSize:13, fontWeight: isSel ? 600 : 400,
                color: isSel ? T.slate : T.gray,
                letterSpacing:-0.25, lineHeight:"1.1", whiteSpace:"nowrap",
              }}>{label}</span>
              <div style={{
                width:40, height:40, borderRadius:48, flexShrink:0,
                backgroundColor: isSel ? "#fafafa" : isHov ? "#f0ece4" : "transparent",
                transition:"background-color 150ms ease",
                display:"flex", alignItems:"center", justifyContent:"center",
              }}>
                <div style={{width:24, height:24, display:"flex", alignItems:"center", justifyContent:"center", overflow:"hidden"}}>
                  {REACTION_ICONS[label]}
                </div>
              </div>
            </button>
          );
        })}
      </div>

      {/* ── Sliding PollCard - z:2, clips and translates ── */}
      <div style={{
        position:"relative", zIndex:2,
        borderRadius:10, overflow:"hidden",
        transform: open ? `translateX(-${SLIDE_W}px)` : "translateX(0)",
        transition:"transform 280ms cubic-bezier(0.4,0,0.2,1)",
      }}>
        <PollCard
          width={357}
          question="U.S. vs. Maduro: Smart Move or Crossing the Line?"
          category="foreign policy"
          timeLabel="Takes ~ 1 min"
          subtext="At 10,000 responses, anonymous results are shared with your congressman."
          shares="842.3k"
          onReactionToggle={toggle}
          reactionOpen={open}
          reactionSelected={selected}
        />
      </div>
    </div>
  );
}

/* ── DetailAccordion - controlled accordion for IssueDetailScreen ── */
function DetailAccordion({icon, title, isOpen, onToggle, children}) {
  const [height, setHeight] = React.useState(isOpen ? null : 0);
  const contentRef = React.useRef(null);
  const prevRef = React.useRef(isOpen);

  React.useEffect(() => {
    if (prevRef.current === isOpen) return;
    prevRef.current = isOpen;
    if (isOpen) {
      setHeight(contentRef.current.scrollHeight);
      const t = setTimeout(() => setHeight(null), 320);
      return () => clearTimeout(t);
    } else {
      setHeight(contentRef.current.scrollHeight);
      requestAnimationFrame(() => requestAnimationFrame(() => setHeight(0)));
    }
  }, [isOpen]);

  return (
    <div style={{backgroundColor:T.warmBg,borderRadius:10,overflow:"hidden",fontFamily:"Inter,sans-serif",boxShadow:T.shadow}}>
      <div onClick={onToggle} style={{display:"flex",alignItems:"center",gap:10,padding:"14px 18px",cursor:"pointer"}}>
        <span style={{display:"flex",flexShrink:0}}>{icon}</span>
        <span style={{flex:1,fontSize:18,fontWeight:800,color:T.slate,lineHeight:1.3,letterSpacing:-0.5}}>{title}</span>
        <span style={{display:"flex",transform:isOpen?"rotate(45deg)":"rotate(0deg)",transition:"transform 0.25s ease"}}>
          <IconPlus/>
        </span>
      </div>
      <div ref={contentRef} style={{overflow:"hidden",height:height===null?"auto":height,transition:"height 0.3s ease"}}>
        <div style={{padding:"0 18px 20px"}}>
          {children}
        </div>
      </div>
    </div>
  );
}

function ContentionSubRow({title, defaultOpen=false, isLast=false}) {
  const [open, setOpen] = React.useState(defaultOpen);
  const [height, setHeight] = React.useState(defaultOpen ? null : 0);
  const contentRef = React.useRef(null);
  const body = "The ongoing war has involved strikes on Iranian sites and retaliatory actions, with reports of casualties among U.S. service members.";

    if (!open) {
      setHeight(contentRef.current.scrollHeight);

function VotingTimeline({
  title = "Voting Timeline",
  bars = [

    {month:"Jan", year:"'26", yeaPct:0.35},
    {month:"Feb", year:"'26", yeaPct:0.05},
  ]
}) {
  const BAR_H = 160;
  const legend = [
    {label:"Yea",        color:"#00b34a"},
    {label:"Nay",        color:"#ff5500"},
    {label:"Absent",     color:"#c5c5c5"},

      <div style={{display:"flex", gap:32, alignItems:"center", justifyContent:"flex-end", overflow:"hidden", paddingLeft:8, paddingRight:8}}>

          return (
            <div key={i} style={{display:"flex", flexDirection:"column", gap:8, alignItems:"center", flexShrink:0}}>

        {legend.map(({label, color}) => (

function DesktopRelatedPulse() {
  const [tab, setTab] = React.useState("Active");

  React.useEffect(() => {
    const t = setTimeout(() => setVisible(true), 40);
    return () => clearTimeout(t);
  }, []);
  const switchTab = (next) => {
    if (next === tab) return;
    setVisible(false);
    setTimeout(() => { setTab(next); setVisible(true); }, 180);
  };
  const activeCards = [

/* ── BeaconScoreInfoModal ──
   Figma 7096-51552 - Beacon Score™ info modal overlay.
   Behaves like PulseInfoModal (RAF-gated reveal, 220ms cubic-bezier fade/scale,
   backdrop blur fade, click-outside-to-close). Vertically centered. */
function BeaconScoreInfoModal({ onClose }) {
  const [shown, setShown] = React.useState(false);
  React.useEffect(() => {
    const id = requestAnimationFrame(() => setShown(true));
    return () => cancelAnimationFrame(id);
  }, []);
  const handleClose = () => {
    setShown(false);
    setTimeout(() => onClose && onClose(), 220);
  };
  const EASE = "cubic-bezier(0.22, 1, 0.36, 1)";
  return (
    <div onClick={handleClose} style={{
      position:"absolute", inset:0,
      backgroundColor: shown ? "rgba(240,232,216,0.8)" : "rgba(240,232,216,0)",
      backdropFilter: shown ? "blur(7.5px)" : "blur(0px)",
      WebkitBackdropFilter: shown ? "blur(7.5px)" : "blur(0px)",
      display:"flex", alignItems:"center", justifyContent:"center",
      zIndex:10,
      transition:`background-color 220ms ease, backdrop-filter 220ms ease, -webkit-backdrop-filter 220ms ease`,
    }}>
      <div onClick={(e)=>e.stopPropagation()} style={{
        width:680, backgroundColor:T.white, borderRadius:10,
        boxShadow:"0 4px 15px rgba(0,0,0,0.15)",
        padding:"24px 40px 64px",
        display:"flex", flexDirection:"column", alignItems:"center",
        gap:8,
        fontFamily:"Inter,sans-serif",
        opacity: shown ? 1 : 0,
        transform: shown ? "translateY(0) scale(1)" : "translateY(8px) scale(0.98)",
        transition:`opacity 220ms ${EASE}, transform 220ms ${EASE}`,
      }}>
        {/* Close row - 24px X top-right */}
        <div style={{display:"flex", justifyContent:"flex-end", width:"100%"}}>
          <div onClick={handleClose} style={{
            width:24, height:24, cursor:"pointer",
            display:"flex", alignItems:"center", justifyContent:"center",
          }}>
            <svg width="13.5" height="13.5" viewBox="0 0 13.5 13.5" fill="none">
              <path d="M1 1L12.5 12.5M12.5 1L1 12.5" stroke={T.slate} strokeWidth="1.5" strokeLinecap="round"/>
            </svg>
          </div>
        </div>
        {/* Title + body - gap 32 */}
        <div style={{display:"flex", flexDirection:"column", gap:32, width:"100%", alignItems:"flex-start"}}>
          <p style={{
            margin:0, fontFamily:"Inter,sans-serif", fontWeight:800,
            fontSize:18, lineHeight:1.3, letterSpacing:-0.5, color:T.slate,
            whiteSpace:"nowrap",
          }}>Beacon Score™</p>
          <p style={{
            margin:0, fontFamily:"Inter,sans-serif", fontWeight:400,
            fontSize:16, lineHeight:1.3, letterSpacing:-0.5, color:T.slate,
            width:"100%", whiteSpace:"pre-wrap",
          }}>{`Copy TBD. The Beacon Score is a 0–100 metric that measures whether an official's actions match their words - built entirely from verifiable public data like voting records, FEC filings, and financial disclosures. \n\nIt's a composite of five sub-scores (Participation, Consistency, Transparency, Follow-Through, and Independence), so the single number is always backed by visible reasoning and primary sources. No opinion, no sentiment, no user ratings - every claim must be defensible with a direct link to the proof.`}</p>
        </div>
      </div>
    </div>
  );
}

    if (mode === "multi") { toggleMulti(i); return; }
    if (singleSel !== null) return;
    setSingleSel(i);
    if (onAnswer) {
      setTimeout(() => setLeaving(true), 450);
      setTimeout(() => onAnswer(opt), 900);
    }
  }
  function handleDone() {
    if (leaving) return;
    setTimeout(() => setLeaving(true), 50);
    setTimeout(() => onAnswer && onAnswer(Array.from(multi)), 500);
  }

  // Hover tracked per-row index (avoids nested component that would remount on every re-render).
  const [hoverIdx, setHoverIdx] = React.useState(null);
  const visible = mounted && !leaving;

  return (
    <div style={{width:1280, minHeight:847, backgroundColor:T.cream, fontFamily:"Inter,sans-serif", position:"relative"}}>
      <DesktopNavBar activeTab="Pulse"/>

                style={{width:24, height:24, display:"flex", alignItems:"center", justifyContent:"center",

                }}
              >
                <IconChevronBack/>
              </div>
              {/* Progress bar */}
              <div style={{flex:"1 1 0", height:6, backgroundColor:T.creamBorder, borderRadius:4, overflow:"hidden"}}>
                <div style={{
                  height:"100%", width:`${barPct}%`,
                  backgroundColor:T.slate, borderRadius:50,
                  transition:"width 0.9s cubic-bezier(0.4, 0, 0.2, 1)",
                }}/>
              </div>
              {/* Close */}
              <div onClick={onClose} style={{width:24, height:24, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center"}}>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">

              </div>
            </div>
            <div style={{fontFamily:"Inter,sans-serif", fontWeight:700, fontSize:16, lineHeight:1.3, color:T.gray}}>

          <div style={{paddingRight:32, width:"100%"}}>
            <div style={{fontFamily:"Inter,sans-serif", fontWeight:900, fontSize:20, lineHeight:1.3, letterSpacing:-0.5, color:T.slate}}>
              {title}
            </div>
          </div>

          {/* Responses */}
          <div style={{display:"flex", flexDirection:"column", gap:20, width:"100%"}}>
            {options.map((opt, i) => {
              const selected = mode === "multi" ? multi.has(i) : singleSel === i;
              const hover = hoverIdx === i;
              const enterDelay = 500 + i * 110;
              const exitDelay = i * 60;
              return (
                <div key={i} style={{
                  width:"100%",
                  opacity: visible ? 1 : 0,
                  transform: visible ? "translateY(0)" : (leaving ? "translateY(-8px)" : "translateY(10px)"),
                  transition: `opacity 0.4s ease ${leaving?exitDelay:enterDelay}ms, transform 0.4s ease ${leaving?exitDelay:enterDelay}ms`,
                }}>
                  <div
                    onMouseEnter={() => setHoverIdx(i)}
                    onMouseLeave={() => setHoverIdx(h => h === i ? null : h)}
                    onClick={() => handleSelect(i, opt)}
                    style={{
                      width:"100%", minHeight:59, boxSizing:"border-box",
                      display:"flex", alignItems:"center", gap:8,
                      padding:"18px 12px", borderRadius:10,
                      backgroundColor: selected ? "#ffffff" : (hover ? "#ffffff" : T.warmBg),
                      color: T.slate,

                      transform: hover ? "translateY(-1px)" : "translateY(0)",
                      transition: "background-color 110ms cubic-bezier(0.22,1,0.36,1), box-shadow 110ms cubic-bezier(0.22,1,0.36,1), transform 110ms cubic-bezier(0.22,1,0.36,1)",
                      cursor:"pointer",
                    }}
                  >
                    <div style={{
                      flex:"1 1 0", minWidth:0,
                      fontFamily:"Inter,sans-serif", fontWeight:800, fontSize:18,
                      lineHeight:1.3, letterSpacing:-0.5,

                    {mode === "multi" && (

/* ── DesktopPulseSurveyFlow ── Chains the 3 Pulse questions on desktop (1280w).
   Same question set as mobile PulseSurveyFlow · Q1/Q2 single-select, Q3 multi-select.
   On Done, loops back to step 1 (desktop results screen not yet built). */
function DesktopPulseSurveyFlow() {
  const steps = [
    {
      title: "How closely have you been following news about the reported U.S. operation related to Venezuela's leadership?",
      options: ["Not at all","Slightly","Somewhat","Closely","Very Closely"],
      mode: "single",
    },
    {
      title: "Who do you believe should have the authority to approve an operation like this?",
      options: [
        "The President acting under executive authority",
        "Congress with explicit authorization",
        "Joint approval between Congress and the Executive",
        "Multinational or UN-backed authorization",
      ],
      mode: "single",
    },
    {
      title: "Which potential impact of this action concerns you the most?",
      options: [
        "The President acting under executive authority",
        "Congress with explicit authorization",
        "Joint approval between Congress and the Executive",
        "Multinational or UN-backed authorization",
      ],
      mode: "multi",
    },
  ];
  const [idx, setIdx] = React.useState(0);
  const cur = steps[idx];
  const [done, setDone] = React.useState(false);
  const advance = () => {
    if (idx < steps.length - 1) setIdx(i => i + 1);
    else setDone(true);
  };
  const back = () => setIdx(i => Math.max(0, i - 1));
  const close = () => { setIdx(0); setDone(false); };
  if (done) return <DesktopPulseSurveyResults onReturn={() => { setIdx(0); setDone(false); }}/>;
  return (
    <DesktopPulseSurveyQuestion
      key={idx}
      step={idx+1}
      total={steps.length}
      prevStep={idx}
      title={cur.title}
      options={cur.options}
      mode={cur.mode}
      onAnswer={advance}
      onBack={back}
      onClose={close}
    />
  );
}

function StateListRow({ state, expanded, onToggle }) {
  const canExpand = !!(state.senators && state.reps);
  // Height-animated drill-down (matches AccordionItem pattern).
  const contentRef = React.useRef(null);
  const [height, setHeight] = React.useState(expanded ? null : 0);
  React.useEffect(() => {
    if (!canExpand) return;
    const el = contentRef.current;
    if (!el) return;
    if (expanded) {
      // Opening: 0 → scrollHeight → natural
      setHeight(el.scrollHeight);
    } else {
      // Closing: natural/scrollHeight → 0 (double RAF so the browser sees an intermediate numeric height before 0)
      setHeight(el.scrollHeight);
      requestAnimationFrame(() => {
        requestAnimationFrame(() => setHeight(0));
      });
    }
  }, [expanded, canExpand]);
  const handleTransitionEnd = (e) => {
    if (e.propertyName !== "height") return;
    if (expanded) setHeight(null); // allow natural height (e.g. if content reflows)
  };
  return (
    <>
      <div
        onClick={canExpand ? onToggle : undefined}
        style={{
          width:"100%", display:"flex", alignItems:"center", gap:16,
          padding:"20px 0",
          borderBottom:"1px solid #d0d2d5",

/* ── PulseSurveyQuestion ── Figma 5935:33602 / 5935:33583.
   Full-screen single-select survey question · chevron back + progress bar + close +
   step counter · title (Inter Black 20) · N SurveyAnswerCards · footer · Pulse tab.
   Props let reuse for step 1/3, 2/3, etc. */
function PulseSurveyQuestion({
  step=1, total=3, prevStep=0,
  title="How closely have you been following news about the reported U.S. operation related to Venezuela's leadership?",
  options=["Not at all","Slightly","Somewhat","Closely","Very Closely"],
  mode="single",
  doneLabel="Done",
  onAnswer=null,
}={}) {
  const [selected, setSelected] = React.useState(mode === "multi" ? new Set() : null);
  const [barPct, setBarPct] = React.useState((prevStep/total)*100);
  const [mounted, setMounted] = React.useState(false);
  const [leaving, setLeaving] = React.useState(false);
  React.useEffect(() => {
    const t = setTimeout(() => { setBarPct((step/total)*100); setMounted(true); }, 80);
    return () => clearTimeout(t);
  }, [step, total]);
  function handleSelect(i) {
    if (mode === "multi") {
      setSelected(prev => {
        const next = new Set(prev);
        if (next.has(i)) next.delete(i); else next.add(i);
        return next;
      });
      return;
    }
    if (selected !== null) return;
    setSelected(i);
    if (onAnswer) {
      setTimeout(() => setLeaving(true), 450);
      setTimeout(() => onAnswer(i), 900);
    }
  }
  function handleDone() {
    if (leaving) return;
    setTimeout(() => setLeaving(true), 50);
    setTimeout(() => onAnswer && onAnswer(selected), 500);
  }
  const isSelected = i => mode === "multi" ? selected.has(i) : selected === i;
  return (
    <div style={{width:393,height:852,position:"relative",overflow:"hidden",fontFamily:"Inter,sans-serif",backgroundColor:T.cream}}>
      <div className="hide-scrollbar" style={{position:"absolute",top:0,left:0,right:0,bottom:75,overflowY:"auto",overflowX:"hidden",scrollbarWidth:"none"}}>
        {/* Status bar */}
        <div style={{height:50,backgroundColor:T.cream,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 20px",position:"sticky",top:0,zIndex:10,flexShrink:0}}>
          <span style={{fontSize:12,fontWeight:700,color:T.slate,lineHeight:"18px"}}>9:41</span>
          <span style={{fontSize:12,fontWeight:700,color:T.slate}}>5G ▪▪▪ 🔋</span>
        </div>

        {/* Progress header: back · bar · close, then 1/3 centered */}
        <div style={{padding:"16px 18px 0",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
          <div style={{display:"flex",alignItems:"center",gap:16,width:"100%"}}>
            <IconChevronBack/>
            <div style={{flex:1,height:6,borderRadius:50,backgroundColor:T.creamBorder,overflow:"hidden"}}>
              <div style={{width:`${barPct}%`,height:"100%",backgroundColor:T.slate,borderRadius:50,transition:"width 0.9s cubic-bezier(0.4,0,0.2,1)"}}/>
            </div>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" style={{display:"block"}}>
              <path d="M6 6L18 18M18 6L6 18" stroke="#141810" strokeWidth="1.5" strokeLinecap="round"/>
            </svg>
          </div>
          <span style={{fontSize:16,fontWeight:700,color:T.gray,lineHeight:"1.3",marginTop:4}}>{step}/{total}</span>
        </div>

        {/* Title */}
        <div style={{padding:"16px 50px 0 18px"}}>
          <p style={{fontSize:20,fontWeight:900,color:T.slate,lineHeight:"1.3",letterSpacing:-0.5,margin:0}}>
            {title}
          </p>
        </div>

        {/* Answer cards - stagger fade in top → bottom */}
        <div style={{padding:"32px 18px 0",display:"flex",flexDirection:"column",gap:20}}>
          {options.map((text,i)=>{
            const visible = mounted && !leaving;
            const enterDelay = 500 + i*110;
            const exitDelay = i*60;
            const sel = isSelected(i);
            return (
              <div key={i} onClick={()=>handleSelect(i)} style={{
                width:"100%",borderRadius:10,
                backgroundColor:sel?"#ffffff":T.warmBg,
                padding:"18px 12px",cursor:"pointer",
                boxShadow:"0px 4px 15px 0px rgba(0,0,0,0.15)",
                boxSizing:"border-box",
                opacity:visible?1:0,
                transform:visible?"translateY(0)":(leaving?"translateY(-8px)":"translateY(10px)"),
                transition:`background-color 0.15s, opacity 0.4s ease ${leaving?exitDelay:enterDelay}ms, transform 0.4s ease ${leaving?exitDelay:enterDelay}ms`,
                display:"flex",alignItems:"center",gap:8
              }}>
                <p style={{flex:1,fontSize:18,fontWeight:800,color:T.slate,lineHeight:"1.3",letterSpacing:-0.5,margin:0}}>{text}</p>
                {mode==="multi" && (
                  <div style={{width:22,height:22,borderRadius:"50%",flexShrink:0,backgroundColor:sel?T.slate:"transparent",border:sel?"none":"1.5px solid #c8c0b8",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    {sel && <svg width="12" height="9" viewBox="0 0 12 9" fill="none"><path d="M1 4.5L4.33 8L11 1" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                  </div>
                )}
              </div>
            );
          })}
          {mode==="multi" && (
            <button onClick={handleDone} disabled={selected.size===0} style={{
              marginTop:12,width:"100%",height:47,borderRadius:8,
              backgroundColor:selected.size===0?"#888":T.slate,color:"#fff",
              fontFamily:"Inter,sans-serif",fontSize:16,fontWeight:700,letterSpacing:-0.5,
              border:"none",cursor:selected.size===0?"default":"pointer",
              opacity:mounted && !leaving ? 1 : 0,
              transform:mounted && !leaving ? "translateY(0)" : (leaving?"translateY(-8px)":"translateY(10px)"),
              transition:`background-color 0.2s, opacity 0.4s ease ${leaving?options.length*60:500+options.length*110}ms, transform 0.4s ease ${leaving?options.length*60:500+options.length*110}ms`
            }}>{doneLabel}</button>
          )}
        </div>

        {/* Footer */}
        <div style={{padding:"16px 18px 24px",display:"flex",flexDirection:"column",gap:4}}>
          <p style={{fontSize:16,fontWeight:700,color:T.slate,lineHeight:"130%",letterSpacing:-0.5,margin:0}}>Be Part of the Signal</p>
          <p style={{fontSize:14,fontWeight:500,color:T.gray,lineHeight:"130%",letterSpacing:-0.5,margin:0}}>Join 6,876 others by sharing your voice</p>
        </div>
      </div>

      {/* Tab bar - Pulse active */}
      <div style={{position:"absolute",bottom:0,left:0,right:0,zIndex:20}}>
        <BottomTabBar activeTab="pulse"/>
      </div>
    </div>
  );
}


/* ── PulseSurveyFlow ── chains Q1 (5935:33602) → Q2 (5935:33583) → Q3 multi (5935:33621) → Results.
   Selecting advances the step, bar animates, cards cascade. Last step is multi-select
   with Done → results card. */
function PulseSurveyFlow() {
  const steps = [
    {
      title: "How closely have you been following news about the reported U.S. operation related to Venezuela's leadership?",
      options: ["Not at all","Slightly","Somewhat","Closely","Very Closely"],
      mode: "single",
    },
    {
      title: "Who do you believe should have the authority to approve an operation like this?",
      options: [
        "The President acting under executive authority",
        "Congress with explicit authorization",
        "Joint approval between Congress and the Executive",
        "Multinational or UN-backed authorization",
      ],
      mode: "single",
    },
    {
      title: "Which potential impact of this action concerns you the most?",
      options: [
        "The President acting under executive authority",
        "Congress with explicit authorization",
        "Joint approval between Congress and the Executive",
        "Multinational or UN-backed authorization",
      ],
      mode: "multi",
    },
  ];
  const [idx, setIdx] = React.useState(0);
  const [done, setDone] = React.useState(false);
  if (done) return <PulseSurveyResults onReturn={() => { setIdx(0); setDone(false); }}/>;
  const cur = steps[idx];
  const advance = () => {
    if (idx < steps.length - 1) setIdx(i => i + 1);
    else setDone(true);
  };
  return (
    <PulseSurveyQuestion
      key={idx}
      step={idx+1}
      total={steps.length}
      prevStep={idx}
      title={cur.title}
      options={cur.options}
      mode={cur.mode}
      onAnswer={advance}
    />
  );
}

/* ── DesktopVotingTimeline ──
   Figma 7096:51485 - widened desktop variant of mobile VotingTimeline.
   White bg, px 20 py 16, gap 24. Bar col: flex:1 with px 16, bar width = col inner.
   Bar H 160. Stacked bars: green (Yea) bottom, orange (Nay) middle, gray (Absent) above,
   deepteal (Not Voting) top. Mobile chart only modeled Yea/Nay - we carry 4 stacks per Figma legend. */
function DesktopVotingTimeline({
  bars = [
    {month:"Sep", year:"'25", yea:0.30, nay:0.70, absent:0,    notVoting:0},
    {month:"Oct", year:"'25", yea:0.20, nay:0.80, absent:0,    notVoting:0},
    {month:"Nov", year:"'25", yea:0.25, nay:0.75, absent:0,    notVoting:0},
    {month:"Dec", year:"'25", yea:0.50, nay:0.50, absent:0,    notVoting:0},
    {month:"Jan", year:"'26", yea:0.35, nay:0.65, absent:0,    notVoting:0},
    {month:"Feb", year:"'26", yea:0.05, nay:0.95, absent:0,    notVoting:0},
  ]
}) {
  const BAR_H = 160;
  const p = useReveal(900);
  const COLORS = { yea:"#00b34a", nay:"#ff5500", absent:"#c5c5c5", notVoting:"#1a5e52" };
  const legend = [
    {label:"Yea",        color:COLORS.yea},
    {label:"Nay",        color:COLORS.nay},
    {label:"Absent",     color:COLORS.absent},
    {label:"Not Voting", color:COLORS.notVoting},
  ];
  return (
    <div style={{
      width:"100%", backgroundColor:T.white,
      padding:"16px 20px", boxSizing:"border-box",
      display:"flex", flexDirection:"column", gap:24, fontFamily:"Inter,sans-serif",
    }}>
      {/* Bars */}
      <div style={{display:"flex", gap:40, alignItems:"flex-end", width:"100%", padding:"0 8px", boxSizing:"border-box"}}>
        {bars.map((bar, i) => {
          const yea = bar.yea || 0, nay = bar.nay || 0, absent = bar.absent || 0, notVoting = bar.notVoting || 0;
          // Animate bar fill top→down: reveal from bottom using p
          const yeaH       = Math.round(BAR_H * yea * p);
          const nayH       = Math.round(BAR_H * nay * p);
          const absentH    = Math.round(BAR_H * absent * p);
          const notVotingH = Math.round(BAR_H * notVoting * p);
          return (
            <div key={i} style={{flex:"1 0 0", minWidth:0, display:"flex", flexDirection:"column", gap:8, alignItems:"center", padding:"0 16px", boxSizing:"border-box"}}>
              {/* Stacked bar col - flex column, justify-end so empty space is on top */}
              <div style={{width:"100%", height:BAR_H, display:"flex", flexDirection:"column", justifyContent:"flex-end", borderRadius:1, overflow:"hidden"}}>
                {notVotingH > 0 && <div style={{height:notVotingH, backgroundColor:COLORS.notVoting}}/>}
                {absentH    > 0 && <div style={{height:absentH,    backgroundColor:COLORS.absent}}/>}
                {nayH       > 0 && <div style={{height:nayH,       backgroundColor:COLORS.nay}}/>}
                {yeaH       > 0 && <div style={{height:yeaH,       backgroundColor:COLORS.yea}}/>}
              </div>
              <div style={{display:"flex", flexDirection:"column", alignItems:"center", lineHeight:1.3}}>
                <span style={{fontSize:13, fontWeight:700, color:T.slate, letterSpacing:-0.5, whiteSpace:"nowrap"}}>{bar.month}</span>
                <span style={{fontSize:12, fontWeight:600, color:T.slate, letterSpacing:-0.5, whiteSpace:"nowrap"}}>{bar.year}</span>
              </div>
            </div>
          );
        })}
      </div>
      {/* Legend */}
      <div style={{display:"flex", gap:24, alignItems:"center", justifyContent:"center", width:"100%"}}>
        {legend.map(({label, color}) => (
          <div key={label} style={{display:"flex", gap:8, alignItems:"center"}}>
            <div style={{width:12, height:12, borderRadius:"50%", backgroundColor:color, flexShrink:0}}/>
            <span style={{fontSize:13, fontWeight:500, color:T.slate, opacity:0.8, letterSpacing:-0.5, whiteSpace:"nowrap"}}>{label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// Monogram - same path, viewBox cropped to the "b" glyph (approx x 0–18 of 102.662).
// Clipping is the default SVG behavior when overflow is not set to "visible".
function BeaconMonogram({ color="#39503D", height=48 }) {
  return (
    <svg viewBox="0 0 18 23.5547" style={{height, width:"auto", display:"block", overflow:"hidden"}} xmlns="http://www.w3.org/2000/svg">
      <path d={BEACON_WORDMARK_PATH} fill={color}/>
    </svg>
  );
}

// Fills are #FF8800 per source SVG.
function BeaconDotInline({ size=10 }) {
  return (
    <svg viewBox="0 0 10.4998 10.4998" style={{width:size, height:size, display:"block"}} xmlns="http://www.w3.org/2000/svg">
      <circle cx="5.24989" cy="5.24989" r="5.24989" fill="#FF8800"/>
    </svg>
  );
}

// Lockup - dot sits above & to the right of the last letter, top-aligned with the ascender.
function BeaconLockup({ variant="dark", type="wordmark", height=48 }) {
  const color = variant === "cream" ? T.warmBg : "#39503D";
  const Mark = type === "monogram" ? BeaconMonogram : BeaconWordmark;
  // Dot is a fixed 18px brand mark regardless of wordmark size.
  const dot = 18;
  return (
    <div style={{position:"relative", display:"inline-block", lineHeight:0}}>
      <Mark color={color} height={height}/>
      <div style={{position:"absolute", top:-Math.round(dot*0.15), right:-Math.round(dot*0.55)}}>
        <BeaconDotInline size={dot}/>
      </div>
    </div>
  );
}

  const stateCols = ["Default","Hover","Active","Disabled"];
  const headerCell = (label) => (
    <div key={label} style={{padding:"8px 12px",fontFamily:"Inter,sans-serif",fontSize:11,fontWeight:700,color:T.gray,letterSpacing:0.5,textTransform:"uppercase",borderBottom:`1px solid ${T.creamBorder}`}}>{label}</div>
  );
  const labelCell = (row) => (
    <div style={{padding:16,display:"flex",flexDirection:"column",gap:4,borderRight:`1px solid ${T.creamBorder}`,backgroundColor:T.warmBg}}>
      <p style={{margin:0,fontFamily:"Inter,sans-serif",fontSize:13,fontWeight:700,color:T.slate,letterSpacing:-0.2,lineHeight:1.3}}>{row.name}</p>
      <p style={{margin:0,fontFamily:"Inter,sans-serif",fontSize:11,fontWeight:500,color:T.gray,letterSpacing:-0.1,lineHeight:1.4}}>{row.spec}</p>
    </div>
  );
  const stateCell = (content, isLast, k) => (
    <div key={k} style={{padding:"20px 16px",display:"flex",alignItems:"center",justifyContent:"center",minHeight:100,backgroundColor:"#FFFFFF",borderRight:isLast?"none":`1px solid ${T.creamBorder}`}}>
      {content}
    </div>
  );

  // 240px Example + 280px Component label + 4 state columns. State columns use
  // minmax(240px, 1fr) so they hold their minimum (240 = Primary CTA needs to not clip)
  // when the viewport is narrow, but EXPAND to fill the available canvas width when
  // there's room. This makes the table stretch to the right edge of its container.
  // Outer wrapper has overflowX:auto so narrow viewports still scroll horizontally
  // instead of clipping.
  const gridCols = "240px 280px repeat(4, minmax(240px, 1fr))";

  // Derive an interactive Example for each row from its Default cell. Toggle is
  // special-cased (no `state` prop, click toggles on/off). For everything else we
  // strip the `state` prop and re-render via InteractiveSample.
  const exampleFor = (row) => {
    const el = row.cells[0];
    if (!el || !el.type) return null;
    if (el.type === Toggle) return <InteractiveToggleSample/>;
    const Component = el.type;
    const baseProps = Object.assign({}, el.props);
    delete baseProps.state;
    return <InteractiveSample render={(s) => <Component {...baseProps} state={s}/>}/>;
  };
  return (
    <div style={{width:"100%",fontFamily:"Inter,sans-serif",overflowX:"auto"}}>
      <div style={{border:`1px solid ${T.creamBorder}`,borderRadius:10,overflow:"hidden",minWidth:"min-content"}}>
        <div style={{display:"grid",gridTemplateColumns:gridCols,backgroundColor:T.warmBg,borderBottom:`1px solid ${T.creamBorder}`}}>
          {headerCell("Example")}
          {headerCell("Component")}
          {stateCols.map(headerCell)}
        </div>
        {rows.map((row,i) => (
          <div key={row.name} style={{display:"grid",gridTemplateColumns:gridCols,borderTop:i===0?"none":`1px solid ${T.creamBorder}`}}>
            {stateCell(exampleFor(row), false, "example")}
            {labelCell(row)}
            {row.cells.map((c,j) => stateCell(c, j===row.cells.length-1, j))}
          </div>
        ))}
      </div>
    </div>
  );
}

        <DesktopIssueDetailScreen/>
      </div>
    );
    case "DesktopPulseSurveyFlow": return (
      <div className="canvas-wrap" style={{padding:0, background:"transparent"}}>
        <DesktopPulseSurveyFlow/>
      </div>
    );
    case "DesktopPulseSurveyResults": return (
      <div className="canvas-wrap" style={{padding:0, background:"transparent"}}>
        <DesktopPulseSurveyResults/>
      </div>
    );
    case "DesktopPulseSurveysScreen": return (
      <div className="canvas-wrap" style={{padding:0, background:"transparent"}}>
        <DesktopPulseSurveysScreen/>
      </div>
    );
    case "DesktopOfficials": return (
      <div className="canvas-wrap" style={{padding:0, background:"transparent"}}>
        <DesktopOfficials/>
      </div>
    );
    default: return null;
  }
}

const ANIMATED_IDS = new Set(["PollCard","PollResultsCard","ScoreItem","DataDetails","ConductDrillDownCard","ScoreDetail","CommitteeBreakdownCard","PoliticalLeaning","StancesScreen","InconsistenciesScreen","ConductScreen","ConductDrillDownScreen","ReactionInteraction","DesktopPoliticianProfileCard","PulseSurveyFlow","PulseSurveyResults","DesktopPulseSurveyResults","DesktopParticipationScreen","DesktopVotingScreen","DesktopCommitteesScreen","DesktopConsistencyScreen","DesktopInconsistenciesScreen","DesktopConductScreen","DesktopCampaignFinanceScreen","ParticipationScreen","VotingScreen"]);

const FULLSCREEN_IDS = new Set(["HomeScreen","ActiveIssuesScreen","IssueDetailScreen","OfficialsScreen","OfficialProfileScreen","ScoreInfoModalScreen","ParticipationScreen","VotingScreen","CommitteesScreen","ConsistencyScreen","StancesScreen","InconsistenciesScreen","ConductScreen","ConductDrillDownScreen","IssueShareScreen","PulseSurveys","PulseSurveyFlow","PulseSurveyResults","DesktopHomeScreen","DesktopActiveIssuesScreen","DesktopIssueDetailScreen","DesktopPulseSurveysScreen","DesktopPulseSurveyFlow","DesktopPulseSurveyResults","DesktopOfficials","DesktopPoliticianProfileScreen","DesktopParticipationScreen","DesktopVotingScreen","DesktopCommitteesScreen","DesktopConsistencyScreen","DesktopInconsistenciesScreen","DesktopConductScreen","DesktopCampaignFinanceScreen"]);
function ComponentCard({comp}) {
  const [replayKey, setReplayKey] = React.useState(0);
  const hasAnim = ANIMATED_IDS.has(comp.id);
  const isFullScreen = FULLSCREEN_IDS.has(comp.id);
  return (
    <div style={{background:isFullScreen?"transparent":"#fff",borderRadius:isFullScreen?0:16,padding:isFullScreen?0:"24px",flex:"0 0 auto",maxWidth:"100%",overflow:isFullScreen?"hidden":"visible"}}>
      {!isFullScreen && <div style={{marginBottom:16,display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:16}}>
        <div>
          <h3 style={{fontSize:16,fontWeight:800,letterSpacing:-0.5,color:T.slate,margin:0}}>{comp.label}</h3>
          <p style={{fontSize:12,color:T.gray,margin:"4px 0 0",letterSpacing:-0.25}}>{comp.desc}</p>
        </div>
        {hasAnim && !isFullScreen && (
          <button onClick={()=>setReplayKey(k=>k+1)} style={{
            display:"flex",alignItems:"center",gap:5,flexShrink:0,
            fontSize:11,fontWeight:700,color:T.slate,letterSpacing:-0.25,
            background:T.cream,border:"none",borderRadius:6,
            padding:"6px 10px",cursor:"pointer",marginTop:1,
            fontFamily:"Inter,sans-serif"
          }}>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
              <path d="M3 3v5h5"/>
            </svg>
            {comp.id === "ReactionInteraction" ? "Reset" : "Replay"}
          </button>
        )}
      </div>}
      <div style={{position:"relative"}}>
        <ComponentPreview id={comp.id} key={replayKey}/>
        {hasAnim && isFullScreen && (
          <button onClick={()=>setReplayKey(k=>k+1)} style={{
            position:"absolute",top:12,right:12,zIndex:10,
            display:"flex",alignItems:"center",gap:5,
            fontSize:11,fontWeight:700,color:T.slate,letterSpacing:-0.25,
            background:T.cream,border:"none",borderRadius:6,
            padding:"6px 10px",cursor:"pointer",
            fontFamily:"Inter,sans-serif",boxShadow:T.shadow
          }}>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
              <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
              <path d="M3 3v5h5"/>
            </svg>
            Replay
          </button>
        )}
      </div>
    </div>
  );
}

function App() {
  const groups = [...new Set(SECTIONS.map(s => s.group))];
  const byGroup = g => SECTIONS.filter(s => s.group === g);
  const componentCount = SECTIONS.filter(s => s.group === "Components").reduce((n,s) => n+s.components.length, 0);
  const screenCount = SECTIONS.filter(s => s.group === "Mobile" || s.group === "Desktop").reduce((n,s) => n+s.components.length, 0);

  // Find first non-empty section as default
  const firstNonEmpty = SECTIONS.find(s => s.components.length > 0);
  const defaultKey = firstNonEmpty ? `${firstNonEmpty.group}:${firstNonEmpty.id}` : "";

  // Read initial selection from URL hash
  const readHash = () => {
    const h = (window.location.hash || "").replace(/^#/, "");
    if (!h) return defaultKey;
    // Find matching section
    const match = SECTIONS.find(s => `${s.group}:${s.id}` === h);
    return match ? h : defaultKey;
  };

  const [selected, setSelected] = React.useState(readHash);
  const [expanded, setExpanded] = React.useState(new Set(groups));

  React.useEffect(() => {
    const onHash = () => setSelected(readHash());
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);

  const pick = (group, id) => {
    const key = `${group}:${id}`;
    setSelected(key);
    window.location.hash = key;
  };

  const toggleGroup = (g) => {
    const next = new Set(expanded);
    next.has(g) ? next.delete(g) : next.add(g);
    setExpanded(next);
  };

  const [gKey, sKey] = selected.split(":");
  const currentSection = SECTIONS.find(s => s.group === gKey && s.id === sKey);

  return (
    <div style={{display:"flex",minHeight:"100vh",background:"#f5f4f0",fontFamily:"Inter,sans-serif"}}>
      {/* Left nav */}
      <aside style={{width:240,background:"#fff",borderRight:"1px solid #e8e4de",position:"sticky",top:0,alignSelf:"flex-start",height:"100vh",overflowY:"auto",flexShrink:0,padding:"20px 0"}}>
        <div style={{padding:"0 20px 20px",borderBottom:`1px solid ${T.creamBorder}`,marginBottom:12}}>
          <h1 style={{fontSize:18,fontWeight:900,letterSpacing:-0.5,color:T.slate,margin:0}}>Beacon</h1>
          <p style={{fontSize:11,color:T.gray,margin:"2px 0 0"}}>{componentCount} components · {screenCount} screens</p>
        </div>
        {groups.map(group => {
          const isExp = expanded.has(group);
          const sections = byGroup(group);
          const totalCount = sections.reduce((n,s)=>n+s.components.length,0);
          return (
            <div key={group} style={{marginBottom:4}}>
              <button
                onClick={()=>toggleGroup(group)}
                style={{display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%",padding:"10px 20px",background:"transparent",border:"none",fontFamily:"Inter,sans-serif",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:0.8,color:T.slate,cursor:"pointer"}}
              >
                <span style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{display:"inline-block",transform:isExp?"rotate(90deg)":"rotate(0deg)",transition:"transform 0.15s",fontSize:10,color:T.gray}}>▸</span>
                  {group}
                </span>
                <span style={{fontSize:10,color:T.gray,fontWeight:600}}>{totalCount}</span>
              </button>
              {isExp && sections.map(s => {
                const key = `${s.group}:${s.id}`;
                const active = selected === key;
                const empty = s.components.length === 0;
                return (
                  <button
                    key={s.id}
                    onClick={()=>pick(s.group, s.id)}
                    style={{
                      display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%",textAlign:"left",
                      padding:"7px 20px 7px 40px",
                      background:active?"#f5f4f0":"transparent",
                      borderLeft:`3px solid ${active?T.slate:"transparent"}`,
                      marginLeft:0,border:"none",borderRadius:0,
                      fontFamily:"Inter,sans-serif",fontSize:13,
                      fontWeight:active?700:500,
                      color:empty?"#bbb":(active?T.slate:"#555"),
                      cursor:"pointer",
                    }}
                  >
                    <span>{s.id}</span>
                    <span style={{fontSize:11,color:T.gray,fontWeight:500}}>{s.components.length || "-"}</span>
                  </button>
                );
              })}
            </div>
          );
        })}
      </aside>

      {/* Main canvas */}
      <main style={{flex:1,minWidth:0,padding:"48px 56px 96px"}}>
        {currentSection ? (
          <>
            <div style={{marginBottom:40,paddingBottom:16,borderBottom:`3px solid ${T.slate}`}}>
              <p style={{fontSize:11,fontWeight:700,color:T.gray,letterSpacing:1,textTransform:"uppercase",margin:0}}>{currentSection.group}</p>
              <div style={{display:"flex",alignItems:"baseline",gap:12,marginTop:4}}>
                <h1 style={{fontSize:32,fontWeight:900,letterSpacing:-1,color:T.slate,margin:0}}>{currentSection.id}</h1>
                <span style={{fontSize:12,fontWeight:600,color:T.gray,letterSpacing:0.5,textTransform:"uppercase"}}>
                  {currentSection.components.length} {currentSection.components.length === 1 ? "item" : "items"}
                </span>
              </div>
            </div>
            {currentSection.components.length > 0 ? (
              <div style={{display:"flex",flexWrap:"wrap",gap:24,alignItems:"flex-start"}}>
                {currentSection.components.map(comp => (
                  <ComponentCard key={comp.id} comp={comp}/>
                ))}
              </div>
            ) : (
              <p style={{color:T.gray,fontSize:14,fontStyle:"italic"}}>Nothing here yet - placeholder section.</p>
            )}
          </>
        ) : (
          <p style={{color:T.gray}}>Select a section from the sidebar.</p>
        )}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
